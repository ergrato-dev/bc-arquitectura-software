<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#1e1e1e"/>

  <!-- Título -->
  <text x="400" y="42" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="bold" text-anchor="middle" fill="#e0e0e0">Patrón Singleton</text>
  <text x="400" y="65" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle" fill="#999">Una única instancia compartida en toda la aplicación</text>

  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3498db"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2ecc71"/>
    </marker>
  </defs>

  <!-- DatabaseConnection (Singleton) -->
  <rect x="260" y="90" width="280" height="160" rx="10" fill="#2a2a2a" stroke="#f39c12" stroke-width="2.5"/>
  <rect x="260" y="90" width="280" height="32" rx="10" fill="#d35400"/>
  <text x="400" y="112" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">DatabaseConnection</text>
  <line x1="260" y1="122" x2="540" y2="122" stroke="#f39c12" stroke-width="1.5"/>
  <text x="280" y="142" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fde3a7">- static #instance = null</text>
  <text x="280" y="160" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fde3a7">- #pool: ConnectionPool</text>
  <line x1="260" y1="170" x2="540" y2="170" stroke="#555" stroke-width="1"/>
  <text x="280" y="188" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#a8d8f0">+ static getInstance(): this</text>
  <text x="280" y="206" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#a8d8f0">+ query(sql): Promise</text>
  <text x="280" y="224" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#a8d8f0">+ static resetInstance()</text>

  <!-- Etiqueta getInstance -->
  <rect x="560" y="95" width="180" height="60" rx="8" fill="#1a2a1a" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="650" y="115" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2ecc71">getInstance()</text>
  <text x="650" y="132" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#aaa">1ª vez → crea instancia</text>
  <text x="650" y="148" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#aaa">siguientes → retorna la misma</text>
  <line x1="560" y1="125" x2="542" y2="125" stroke="#2ecc71" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Módulo A -->
  <rect x="60" y="310" width="170" height="70" rx="8" fill="#2a2a2a" stroke="#3498db" stroke-width="2"/>
  <text x="145" y="332" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#3498db">user-service.js</text>
  <text x="145" y="352" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#ccc">const db =</text>
  <text x="145" y="368" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#ccc">DB.getInstance()</text>

  <!-- Módulo B -->
  <rect x="315" y="310" width="170" height="70" rx="8" fill="#2a2a2a" stroke="#3498db" stroke-width="2"/>
  <text x="400" y="332" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#3498db">order-service.js</text>
  <text x="400" y="352" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#ccc">const db =</text>
  <text x="400" y="368" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#ccc">DB.getInstance()</text>

  <!-- Módulo C -->
  <rect x="570" y="310" width="170" height="70" rx="8" fill="#2a2a2a" stroke="#3498db" stroke-width="2"/>
  <text x="655" y="332" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#3498db">task-service.js</text>
  <text x="655" y="352" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#ccc">const db =</text>
  <text x="655" y="368" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#ccc">DB.getInstance()</text>

  <!-- Flechas módulos → singleton -->
  <line x1="145" y1="310" x2="340" y2="255" stroke="#3498db" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <line x1="400" y1="310" x2="400" y2="255" stroke="#3498db" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <line x1="655" y1="310" x2="465" y2="255" stroke="#3498db" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>

  <!-- Leyenda misma instancia -->
  <text x="400" y="295" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#f39c12">db1 === db2 === db3  →  true ✅</text>

  <!-- Advertencia -->
  <rect x="30" y="405" width="740" height="55" rx="8" fill="#2d1a00" stroke="#e67e22" stroke-width="1.5"/>
  <text x="400" y="425" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#e67e22">⚠️  Precaución</text>
  <text x="400" y="445" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#ccc">Los módulos ES6 (import/export) ya son singletons por naturaleza.</text>
  <text x="400" y="460" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#ccc">Abuso del Singleton → estado global implícito → dificulta tests.</text>
</svg>
