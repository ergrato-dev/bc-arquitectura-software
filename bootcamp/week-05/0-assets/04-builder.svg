<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <rect width="900" height="520" fill="#1e1e1e"/>

  <!-- Título -->
  <text x="450" y="42" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="bold" text-anchor="middle" fill="#e0e0e0">Patrón Builder</text>
  <text x="450" y="65" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle" fill="#999">Construcción fluida paso a paso de objetos complejos</text>

  <defs>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e67e22"/>
    </marker>
    <marker id="arrowGray2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
  </defs>

  <!-- OrderBuilder class -->
  <rect x="30" y="85" width="260" height="220" rx="10" fill="#2a2a2a" stroke="#9b59b6" stroke-width="2.5"/>
  <rect x="30" y="85" width="260" height="32" rx="10" fill="#6c3483"/>
  <text x="160" y="107" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">OrderBuilder</text>
  <line x1="30" y1="117" x2="290" y2="117" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="50" y="136" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#d7bde2">- #order: {}</text>
  <line x1="30" y1="146" x2="290" y2="146" stroke="#555" stroke-width="1"/>
  <text x="50" y="164" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#a8d8f0">+ forCustomer(id): this</text>
  <text x="50" y="182" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#a8d8f0">+ withItem(sku, qty): this</text>
  <text x="50" y="200" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#a8d8f0">+ withDiscount(code): this</text>
  <text x="50" y="218" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#a8d8f0">+ shippingTo(address): this</text>
  <text x="50" y="236" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#a8d8f0">+ payWith(method): this</text>
  <text x="50" y="254" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#2ecc71">+ build(): Order</text>
  <text x="50" y="275" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999">+ validate(): void</text>
  <text x="50" y="293" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#999">(lanza si campos requeridos faltan)</text>

  <!-- Order class -->
  <rect x="620" y="100" width="240" height="160" rx="10" fill="#2a2a2a" stroke="#2ecc71" stroke-width="2.5"/>
  <rect x="620" y="100" width="240" height="32" rx="10" fill="#1a5c2a"/>
  <text x="740" y="122" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Order</text>
  <line x1="620" y1="132" x2="860" y2="132" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="640" y="151" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#abebc6">customerId: string</text>
  <text x="640" y="169" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#abebc6">items: Item[]</text>
  <text x="640" y="187" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#abebc6">discountCode?: string</text>
  <text x="640" y="205" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#abebc6">shippingAddress: Address</text>
  <text x="640" y="223" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#abebc6">paymentMethod: string</text>
  <text x="640" y="241" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#abebc6">createdAt: Date</text>

  <!-- Flecha build() → Order -->
  <line x1="290" y1="185" x2="615" y2="185" stroke="#2ecc71" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="450" y="175" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#2ecc71">.build()</text>

  <!-- Fluent chain diagram -->
  <rect x="30" y="345" width="840" height="50" rx="8" fill="#1a1440" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="450" y="362" font-family="Inter, system-ui, sans-serif" font-size="10.5" text-anchor="middle" fill="#9b59b6" font-weight="bold">Fluent Interface (Method Chaining)</text>
  <text x="450" y="382" font-family="'Courier New', Courier, monospace" font-size="11" text-anchor="middle" fill="#d7bde2">new OrderBuilder().forCustomer(id).withItem(sku,2).withDiscount(&apos;PROMO10&apos;).shippingTo(addr).payWith(&apos;pse&apos;).build()</text>

  <!-- Pasos decorativos horizontales -->
  <g>
    <rect x="30" y="420" width="130" height="45" rx="6" fill="#2a2a2a" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="95" y="438" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#9b59b6">1</text>
    <text x="95" y="454" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#ccc">forCustomer()</text>

    <rect x="185" y="420" width="130" height="45" rx="6" fill="#2a2a2a" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="250" y="438" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#9b59b6">2</text>
    <text x="250" y="454" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#ccc">withItem()</text>

    <rect x="340" y="420" width="130" height="45" rx="6" fill="#2a2a2a" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="405" y="438" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#9b59b6">3</text>
    <text x="405" y="454" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#ccc">withDiscount()</text>

    <rect x="495" y="420" width="130" height="45" rx="6" fill="#2a2a2a" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="560" y="438" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#9b59b6">4</text>
    <text x="560" y="454" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#ccc">shippingTo()</text>

    <rect x="650" y="420" width="130" height="45" rx="6" fill="#2a2a2a" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="715" y="438" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#9b59b6">5</text>
    <text x="715" y="454" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#ccc">payWith()</text>

    <rect x="805" y="420" width="65" height="45" rx="6" fill="#1a5c2a" stroke="#2ecc71" stroke-width="2"/>
    <text x="837" y="445" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2ecc71">build()</text>

    <!-- flechas entre pasos -->
    <line x1="160" y1="442" x2="182" y2="442" stroke="#9b59b6" stroke-width="1.5" marker-end="url(#arrowGray2)"/>
    <line x1="315" y1="442" x2="337" y2="442" stroke="#9b59b6" stroke-width="1.5" marker-end="url(#arrowGray2)"/>
    <line x1="470" y1="442" x2="492" y2="442" stroke="#9b59b6" stroke-width="1.5" marker-end="url(#arrowGray2)"/>
    <line x1="625" y1="442" x2="647" y2="442" stroke="#9b59b6" stroke-width="1.5" marker-end="url(#arrowGray2)"/>
    <line x1="780" y1="442" x2="802" y2="442" stroke="#2ecc71" stroke-width="1.5" marker-end="url(#arrowGray2)"/>
  </g>

  <!-- Nota SRP -->
  <rect x="30" y="295" width="840" height="38" rx="7" fill="#1a2a1a" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="450" y="313" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#2ecc71">✅  <tspan font-weight="bold">SRP</tspan>: el Builder sabe construir — la clase Order solo almacena datos</text>
  <text x="450" y="328" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#ccc">✅  Validaciones centralizadas antes del build() → objetos siempre válidos</text>
</svg>
