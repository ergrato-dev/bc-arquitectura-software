<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <rect width="900" height="520" fill="#1e1e1e"/>

  <text x="450" y="42" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="bold" text-anchor="middle" fill="#e0e0e0">Patr&#xF3;n Decorator</text>
  <text x="450" y="65" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle" fill="#999">Agrega responsabilidades din&#xE1;micamente sin modificar la clase original</text>

  <defs>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9b59b6"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3498db"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e67e22"/>
    </marker>
  </defs>

  <!-- IUserService interface -->
  <rect x="330" y="85" width="240" height="90" rx="10" fill="#2a2a2a" stroke="#9b59b6" stroke-width="2.5" stroke-dasharray="6,3"/>
  <rect x="330" y="85" width="240" height="28" rx="10" fill="#4a1a6a"/>
  <text x="450" y="96" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#ccc">&#xAB;interface&#xBB;</text>
  <text x="450" y="110" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#9b59b6">IUserService</text>
  <line x1="330" y1="113" x2="570" y2="113" stroke="#9b59b6" stroke-width="1"/>
  <text x="350" y="132" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#d7bde2">+ findById(id): User</text>
  <text x="350" y="150" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#d7bde2">+ save(user): User</text>
  <text x="350" y="168" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#d7bde2">+ delete(id): void</text>

  <!-- UserService (base) -->
  <rect x="330" y="230" width="240" height="90" rx="10" fill="#2a2a2a" stroke="#3498db" stroke-width="2.5"/>
  <rect x="330" y="230" width="240" height="28" rx="10" fill="#1a3a5c"/>
  <text x="450" y="249" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#3498db">UserService</text>
  <line x1="330" y1="258" x2="570" y2="258" stroke="#3498db" stroke-width="1"/>
  <text x="350" y="276" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#a8d8f0">+ findById(id): User</text>
  <text x="350" y="294" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#a8d8f0">+ save(user): User</text>
  <text x="350" y="312" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#a8d8f0">+ delete(id): void</text>

  <!-- Flecha UserService implements IUserService -->
  <line x1="450" y1="230" x2="450" y2="178" stroke="#3498db" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>
  <text x="470" y="207" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7f8c8d">implements</text>

  <!-- CachedUserService -->
  <rect x="65" y="370" width="220" height="110" rx="10" fill="#2a2a2a" stroke="#2ecc71" stroke-width="2.5"/>
  <rect x="65" y="370" width="220" height="28" rx="10" fill="#1a5c2a"/>
  <text x="175" y="389" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2ecc71">CachedUserService</text>
  <line x1="65" y1="398" x2="285" y2="398" stroke="#2ecc71" stroke-width="1"/>
  <text x="85" y="416" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#abebc6">- #wrapped: IUserService</text>
  <text x="85" y="434" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#abebc6">- #cache: Map</text>
  <line x1="65" y1="443" x2="285" y2="443" stroke="#555" stroke-width="1"/>
  <text x="85" y="460" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#abebc6">+ findById(id): User</text>
  <text x="85" y="476" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#7f8c8d">  cache miss &#x2192; wrapped</text>

  <!-- LoggingUserService -->
  <rect x="615" y="370" width="220" height="110" rx="10" fill="#2a2a2a" stroke="#e67e22" stroke-width="2.5"/>
  <rect x="615" y="370" width="220" height="28" rx="10" fill="#5a2a0a"/>
  <text x="725" y="389" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#e67e22">LoggingUserService</text>
  <line x1="615" y1="398" x2="835" y2="398" stroke="#e67e22" stroke-width="1"/>
  <text x="635" y="416" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fad7a0">- #wrapped: IUserService</text>
  <text x="635" y="434" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fad7a0">- #logger: Logger</text>
  <line x1="615" y1="443" x2="835" y2="443" stroke="#555" stroke-width="1"/>
  <text x="635" y="460" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fad7a0">+ findById(id): User</text>
  <text x="635" y="476" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#7f8c8d">  log before + after call</text>

  <!-- Flechas decorators -> implements IUserService -->
  <line x1="175" y1="370" x2="380" y2="178" stroke="#2ecc71" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>
  <line x1="725" y1="370" x2="520" y2="178" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>

  <!-- Flechas wrapped -> UserService (composicion) -->
  <line x1="285" y1="425" x2="328" y2="305" stroke="#2ecc71" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrowBlue)"/>
  <line x1="615" y1="425" x2="572" y2="305" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrowBlue)"/>

  <!-- Composicion label -->
  <text x="280" y="350" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7f8c8d">wraps</text>
  <text x="590" y="350" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7f8c8d">wraps</text>

  <!-- OCP callout -->
  <rect x="330" y="458" width="240" height="45" rx="8" fill="#1a2a1a" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="450" y="476" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2ecc71">OCP &#x2705; — SRP &#x2705;</text>
  <text x="450" y="493" font-family="Inter, system-ui, sans-serif" font-size="10.5" text-anchor="middle" fill="#ccc">Agrega cache o logs sin tocar UserService</text>
</svg>
