<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <rect width="900" height="520" fill="#1e1e1e"/>

  <text x="450" y="42" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="bold" text-anchor="middle" fill="#e0e0e0">Patr&#xF3;n Observer</text>
  <text x="450" y="65" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle" fill="#999">Notifica autom&#xE1;ticamente a los suscriptores cuando el estado cambia</text>

  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e74c3c"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9b59b6"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
  </defs>

  <!-- IOrderObserver interface -->
  <rect x="330" y="85" width="240" height="80" rx="10" fill="#2a2a2a" stroke="#9b59b6" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="330" y="85" width="240" height="28" rx="10" fill="#4a1a6a"/>
  <text x="450" y="96" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#ccc">&#xAB;interface&#xBB;</text>
  <text x="450" y="110" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#9b59b6">IOrderObserver</text>
  <line x1="330" y1="113" x2="570" y2="113" stroke="#9b59b6" stroke-width="1"/>
  <text x="350" y="133" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#d7bde2">+ update(event: OrderEvent)</text>
  <text x="350" y="153" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#d7bde2">: Promise&#x3C;void&#x3E;</text>

  <!-- OrderEventEmitter (Subject) -->
  <rect x="295" y="220" width="310" height="130" rx="10" fill="#2a2a2a" stroke="#e74c3c" stroke-width="2.5"/>
  <rect x="295" y="220" width="310" height="28" rx="10" fill="#5c1a1a"/>
  <text x="450" y="239" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#e74c3c">OrderEventEmitter</text>
  <line x1="295" y1="248" x2="605" y2="248" stroke="#e74c3c" stroke-width="1"/>
  <text x="315" y="266" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#f1948a">- #observers: IOrderObserver[]</text>
  <line x1="295" y1="275" x2="605" y2="275" stroke="#555" stroke-width="1"/>
  <text x="315" y="293" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#a8d8f0">+ subscribe(observer): void</text>
  <text x="315" y="311" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#a8d8f0">+ unsubscribe(observer): void</text>
  <text x="315" y="329" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#a8d8f0">+ emit(event: OrderEvent): void</text>
  <text x="315" y="342" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7f8c8d">  notifica a todos los #observers</text>

  <!-- Flecha emitter -> interface -->
  <line x1="450" y1="220" x2="450" y2="168" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <text x="462" y="196" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7f8c8d">usa</text>

  <!-- EmailObserver -->
  <rect x="30" y="400" width="175" height="80" rx="8" fill="#2a2a2a" stroke="#3498db" stroke-width="2"/>
  <rect x="30" y="400" width="175" height="26" rx="8" fill="#1a3a5c"/>
  <text x="117" y="418" font-family="Inter, system-ui, sans-serif" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#3498db">EmailObserver</text>
  <line x1="30" y1="426" x2="205" y2="426" stroke="#3498db" stroke-width="1"/>
  <text x="50" y="444" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#a8d8f0">+ update(event)</text>
  <text x="50" y="460" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7f8c8d">env&#xED;a correo al cliente</text>
  <text x="50" y="474" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7f8c8d">con estado del pedido</text>

  <!-- SmsObserver -->
  <rect x="230" y="400" width="175" height="80" rx="8" fill="#2a2a2a" stroke="#2ecc71" stroke-width="2"/>
  <rect x="230" y="400" width="175" height="26" rx="8" fill="#1a5c2a"/>
  <text x="317" y="418" font-family="Inter, system-ui, sans-serif" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#2ecc71">SmsObserver</text>
  <line x1="230" y1="426" x2="405" y2="426" stroke="#2ecc71" stroke-width="1"/>
  <text x="250" y="444" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#abebc6">+ update(event)</text>
  <text x="250" y="460" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7f8c8d">env&#xED;a SMS por Twilio</text>
  <text x="250" y="474" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7f8c8d">o WhatsApp</text>

  <!-- InventoryObserver -->
  <rect x="430" y="400" width="195" height="80" rx="8" fill="#2a2a2a" stroke="#e67e22" stroke-width="2"/>
  <rect x="430" y="400" width="195" height="26" rx="8" fill="#5a2a0a"/>
  <text x="527" y="418" font-family="Inter, system-ui, sans-serif" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#e67e22">InventoryObserver</text>
  <line x1="430" y1="426" x2="625" y2="426" stroke="#e67e22" stroke-width="1"/>
  <text x="450" y="444" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#fad7a0">+ update(event)</text>
  <text x="450" y="460" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7f8c8d">descuenta stock del</text>
  <text x="450" y="474" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7f8c8d">producto comprado</text>

  <!-- AnalyticsObserver -->
  <rect x="650" y="400" width="195" height="80" rx="8" fill="#2a2a2a" stroke="#9b59b6" stroke-width="2"/>
  <rect x="650" y="400" width="195" height="26" rx="8" fill="#4a1a6a"/>
  <text x="747" y="418" font-family="Inter, system-ui, sans-serif" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#9b59b6">AnalyticsObserver</text>
  <line x1="650" y1="426" x2="845" y2="426" stroke="#9b59b6" stroke-width="1"/>
  <text x="670" y="444" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#d7bde2">+ update(event)</text>
  <text x="670" y="460" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7f8c8d">registra m&#xE9;tricas en</text>
  <text x="670" y="474" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7f8c8d">BigQuery / Amplitude</text>

  <!-- Flechas observers implements interface -->
  <line x1="117" y1="400" x2="360" y2="168" stroke="#3498db" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>
  <line x1="317" y1="400" x2="400" y2="168" stroke="#2ecc71" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>
  <line x1="527" y1="400" x2="500" y2="168" stroke="#e67e22" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>
  <line x1="747" y1="400" x2="540" y2="168" stroke="#9b59b6" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>

  <!-- emit() label -->
  <text x="450" y="390" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#e74c3c">emit(&#x27;ORDER_PLACED&#x27;, { orderId, total })</text>
  <line x1="370" y1="350" x2="117" y2="398" stroke="#e74c3c" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
  <line x1="400" y1="350" x2="317" y2="398" stroke="#e74c3c" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
  <line x1="500" y1="350" x2="527" y2="398" stroke="#e74c3c" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
  <line x1="530" y1="350" x2="747" y2="398" stroke="#e74c3c" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
</svg>
