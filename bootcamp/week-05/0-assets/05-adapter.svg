<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <rect width="900" height="520" fill="#1e1e1e"/>

  <!-- Título -->
  <text x="450" y="42" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="bold" text-anchor="middle" fill="#e0e0e0">Patrón Adapter</text>
  <text x="450" y="65" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle" fill="#999">Integra interfaces incompatibles sin modificar el código existente</text>

  <defs>
    <marker id="arrowBlueA" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3498db"/>
    </marker>
    <marker id="arrowGreenA" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2ecc71"/>
    </marker>
    <marker id="arrowOrangeA" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e67e22"/>
    </marker>
  </defs>

  <!-- Client / OrderController -->
  <rect x="30" y="180" width="160" height="90" rx="10" fill="#2a2a2a" stroke="#3498db" stroke-width="2.5"/>
  <rect x="30" y="180" width="160" height="30" rx="10" fill="#1a3a5c"/>
  <text x="110" y="200" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#3498db">OrderController</text>
  <line x1="30" y1="210" x2="190" y2="210" stroke="#3498db" stroke-width="1"/>
  <text x="50" y="228" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#ccc">processPayment(</text>
  <text x="50" y="244" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#ccc">  processor, data)</text>
  <text x="50" y="260" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#96c8e8">usa PaymentProcessor</text>

  <!-- Interface PaymentProcessor -->
  <rect x="300" y="140" width="220" height="100" rx="10" fill="#2a2a2a" stroke="#9b59b6" stroke-width="2.5" stroke-dasharray="6,3"/>
  <rect x="300" y="140" width="220" height="30" rx="10" fill="#4a1a6a"/>
  <text x="410" y="152" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#ccc">«interface»</text>
  <text x="410" y="166" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#9b59b6">PaymentProcessor</text>
  <line x1="300" y1="170" x2="520" y2="170" stroke="#9b59b6" stroke-width="1"/>
  <text x="320" y="189" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#d7bde2">+ charge(amount, currency)</text>
  <text x="320" y="207" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#d7bde2">+ refund(transactionId)</text>
  <text x="320" y="225" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#d7bde2">+ getStatus(transactionId)</text>

  <!-- Flecha client → interface -->
  <line x1="190" y1="222" x2="297" y2="195" stroke="#3498db" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowBlueA)"/>

  <!-- StripeAdapter -->
  <rect x="230" y="310" width="195" height="110" rx="10" fill="#2a2a2a" stroke="#2ecc71" stroke-width="2"/>
  <rect x="230" y="310" width="195" height="30" rx="10" fill="#1a5c2a"/>
  <text x="327" y="330" font-family="Inter, system-ui, sans-serif" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#2ecc71">StripeAdapter</text>
  <line x1="230" y1="340" x2="425" y2="340" stroke="#2ecc71" stroke-width="1"/>
  <text x="248" y="358" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#abebc6">- stripe: StripeSDK</text>
  <text x="248" y="376" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#abebc6">+ charge(amount, currency)</text>
  <text x="248" y="394" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#abebc6">+ refund(transactionId)</text>
  <text x="248" y="412" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#abebc6">+ getStatus(id)</text>

  <!-- NequiAdapter -->
  <rect x="475" y="310" width="195" height="110" rx="10" fill="#2a2a2a" stroke="#e67e22" stroke-width="2"/>
  <rect x="475" y="310" width="195" height="30" rx="10" fill="#5a2a0a"/>
  <text x="572" y="330" font-family="Inter, system-ui, sans-serif" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#e67e22">NequiAdapter</text>
  <line x1="475" y1="340" x2="670" y2="340" stroke="#e67e22" stroke-width="1"/>
  <text x="493" y="358" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fad7a0">- nequi: NequiSDK</text>
  <text x="493" y="376" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fad7a0">+ charge(amount, currency)</text>
  <text x="493" y="394" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fad7a0">+ refund(transactionId)</text>
  <text x="493" y="412" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fad7a0">+ getStatus(id)</text>

  <!-- Flechas adapter → interface (implementa) -->
  <line x1="327" y1="310" x2="385" y2="243" stroke="#2ecc71" stroke-width="1.5" marker-end="url(#arrowGreenA)"/>
  <line x1="572" y1="310" x2="435" y2="243" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arrowOrangeA)"/>

  <!-- SDKs externos -->
  <rect x="190" y="445" width="140" height="48" rx="7" fill="#1e1e2e" stroke="#555" stroke-width="1.5"/>
  <text x="260" y="463" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#7f8c8d">StripeSDK</text>
  <text x="260" y="480" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">stripe.charges.create()</text>

  <rect x="465" y="445" width="145" height="48" rx="7" fill="#1e1e2e" stroke="#555" stroke-width="1.5"/>
  <text x="537" y="463" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#7f8c8d">NequiSDK</text>
  <text x="537" y="480" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">nequi.cobrar({ monto })</text>

  <line x1="327" y1="420" x2="260" y2="443" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="572" y1="420" x2="537" y2="443" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- OCP callout -->
  <rect x="700" y="140" width="170" height="80" rx="8" fill="#1a2a1a" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="785" y="162" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2ecc71">OCP ✅</text>
  <text x="785" y="180" font-family="Inter, system-ui, sans-serif" font-size="10.5" text-anchor="middle" fill="#ccc">Agrega DaviPlata,</text>
  <text x="785" y="196" font-family="Inter, system-ui, sans-serif" font-size="10.5" text-anchor="middle" fill="#ccc">Wompi… creando</text>
  <text x="785" y="212" font-family="Inter, system-ui, sans-serif" font-size="10.5" text-anchor="middle" fill="#ccc">nuevos Adapters.</text>

  <!-- DIP callout -->
  <rect x="700" y="240" width="170" height="65" rx="8" fill="#1a1440" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="785" y="260" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#9b59b6">DIP ✅</text>
  <text x="785" y="278" font-family="Inter, system-ui, sans-serif" font-size="10.5" text-anchor="middle" fill="#ccc">OrderController depende</text>
  <text x="785" y="294" font-family="Inter, system-ui, sans-serif" font-size="10.5" text-anchor="middle" fill="#ccc">de la abstracción, no</text>
  <text x="785" y="310" font-family="Inter, system-ui, sans-serif" font-size="10.5" text-anchor="middle" fill="#ccc">del SDK concreto.</text>
</svg>
