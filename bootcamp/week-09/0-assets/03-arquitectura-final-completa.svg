<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" width="900" height="580" font-family="Inter, Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="580" fill="#1e1e1e" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" fill="#ffffff" font-size="18" font-weight="700" text-anchor="middle">Arquitectura Final Completa — Todas las Capas</text>
  <text x="450" y="56" fill="#9ca3af" font-size="12" text-anchor="middle">Semanas 1–8 integradas: Hexagonal + Docker + JWT + RBAC</text>

  <!-- ── OUTER: Docker Compose boundary ── -->
  <rect x="30" y="70" width="840" height="430" fill="#0a0f1a" rx="10" stroke="#0284c7" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="50" y="91" fill="#0284c7" font-size="11" font-weight="600">🐳 Docker Compose Environment</text>

  <!-- ── Container: PostgreSQL ── -->
  <rect x="650" y="105" width="190" height="100" fill="#0f172a" rx="8" stroke="#10b981" stroke-width="1.5"/>
  <text x="745" y="127" fill="#10b981" font-size="11" font-weight="700" text-anchor="middle">🗄️ PostgreSQL</text>
  <text x="745" y="143" fill="#4b5563" font-size="9.5" text-anchor="middle">Container: postgres:16</text>
  <text x="745" y="157" fill="#94a3b8" font-size="9" text-anchor="middle">Port: 5432 (internal)</text>
  <text x="745" y="170" fill="#94a3b8" font-size="9" text-anchor="middle">Volume: postgres_data</text>
  <text x="745" y="185" fill="#4b5563" font-size="9" text-anchor="middle">DB: [tu_dominio]</text>

  <!-- ── Container: pgAdmin ── -->
  <rect x="650" y="220" width="190" height="80" fill="#0f172a" rx="8" stroke="#6b7280" stroke-width="1"/>
  <text x="745" y="242" fill="#6b7280" font-size="11" font-weight="700" text-anchor="middle">🖥️ pgAdmin</text>
  <text x="745" y="257" fill="#4b5563" font-size="9.5" text-anchor="middle">Container: dpage/pgadmin4</text>
  <text x="745" y="271" fill="#94a3b8" font-size="9" text-anchor="middle">Port: 5050 → 80</text>
  <text x="745" y="285" fill="#4b5563" font-size="9" text-anchor="middle">Admin tool</text>

  <!-- pgAdmin → PostgreSQL -->
  <line x1="745" y1="300" x2="745" y2="322" stroke="#4b5563" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="755" y="315" fill="#4b5563" font-size="8">SQL</text>

  <!-- ── Main Container: EduFlow API ── -->
  <rect x="55" y="105" width="570" height="380" fill="#0f172a" rx="8" stroke="#6366f1" stroke-width="2"/>
  <text x="340" y="127" fill="#6366f1" font-size="12" font-weight="700" text-anchor="middle">🔷 EduFlow API — Container: Node.js + Express</text>
  <text x="340" y="143" fill="#4b5563" font-size="10" text-anchor="middle">Port: 3000 · Arquitectura Hexagonal · JWT + RBAC · OWASP Hardening</text>

  <!-- Security Middleware layer -->
  <rect x="70" y="155" width="540" height="52" fill="#1a0a0a" rx="6" stroke="#ef4444" stroke-width="1.5"/>
  <text x="340" y="173" fill="#ef4444" font-size="11" font-weight="600" text-anchor="middle">🛡️ Security Middleware Layer (sem 08)</text>
  <text x="140" y="192" fill="#fca5a5" font-size="9.5" text-anchor="middle">authenticate.js</text>
  <text x="240" y="192" fill="#fca5a5" font-size="9.5" text-anchor="middle">authorize.js</text>
  <text x="340" y="192" fill="#fca5a5" font-size="9.5" text-anchor="middle">validate.js (Zod)</text>
  <text x="450" y="192" fill="#fca5a5" font-size="9.5" text-anchor="middle">helmet + rate-limit</text>
  <text x="560" y="192" fill="#fca5a5" font-size="9.5" text-anchor="middle">cors</text>

  <!-- Interface Layer -->
  <rect x="70" y="215" width="250" height="115" fill="#0a1a1a" rx="6" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="195" y="233" fill="#06b6d4" font-size="10" font-weight="600" text-anchor="middle">🌐 Interfaces HTTP (sem 04)</text>
  <text x="195" y="250" fill="#94a3b8" font-size="9.5" text-anchor="middle">auth.router.js</text>
  <text x="195" y="265" fill="#94a3b8" font-size="9.5" text-anchor="middle">[entidad].router.js</text>
  <text x="195" y="280" fill="#94a3b8" font-size="9.5" text-anchor="middle">POST /auth/register</text>
  <text x="195" y="295" fill="#94a3b8" font-size="9.5" text-anchor="middle">POST /auth/login</text>
  <text x="195" y="310" fill="#94a3b8" font-size="9.5" text-anchor="middle">GET|POST /[recurso]</text>

  <!-- Application Layer -->
  <rect x="70" y="340" width="250" height="130" fill="#0a1a0a" rx="6" stroke="#10b981" stroke-width="1.5"/>
  <text x="195" y="358" fill="#10b981" font-size="10" font-weight="600" text-anchor="middle">⚙️ Application (sem 02, 06)</text>
  <text x="195" y="376" fill="#94a3b8" font-size="9.5" text-anchor="middle">RegisterUserUseCase</text>
  <text x="195" y="391" fill="#94a3b8" font-size="9.5" text-anchor="middle">LoginUserUseCase</text>
  <text x="195" y="406" fill="#94a3b8" font-size="9.5" text-anchor="middle">[TuUseCase]</text>
  <text x="195" y="424" fill="#4b5563" font-size="8.5" text-anchor="middle">Puertos (interfaces)</text>
  <text x="195" y="437" fill="#4b5563" font-size="8.5" text-anchor="middle">IUserRepo • ITokenService</text>
  <text x="195" y="456" fill="#4b5563" font-size="8.5" text-anchor="middle">SOLID · DIP aplicado</text>

  <!-- Domain Layer -->
  <rect x="340" y="215" width="260" height="255" fill="#0a0a1a" rx="6" stroke="#8b5cf6" stroke-width="2"/>
  <text x="470" y="233" fill="#8b5cf6" font-size="10" font-weight="700" text-anchor="middle">💜 Domain (sem 02–06)</text>
  <text x="470" y="248" fill="#6d6aff" font-size="9" font-weight="500" text-anchor="middle">CERO dependencias externas</text>

  <rect x="355" y="258" width="110" height="60" fill="#12122a" rx="4" stroke="#8b5cf6" stroke-width="1"/>
  <text x="410" y="275" fill="#a78bfa" font-size="9" font-weight="600" text-anchor="middle">Entities</text>
  <text x="410" y="290" fill="#94a3b8" font-size="8.5" text-anchor="middle">User.entity.js</text>
  <text x="410" y="303" fill="#94a3b8" font-size="8.5" text-anchor="middle">[Entidad].entity.js</text>

  <rect x="480" y="258" width="110" height="60" fill="#12122a" rx="4" stroke="#8b5cf6" stroke-width="1"/>
  <text x="535" y="275" fill="#a78bfa" font-size="9" font-weight="600" text-anchor="middle">Value Objects</text>
  <text x="535" y="290" fill="#94a3b8" font-size="8.5" text-anchor="middle">Email.vo.js</text>
  <text x="535" y="303" fill="#94a3b8" font-size="8.5" text-anchor="middle">Password.vo.js</text>

  <rect x="355" y="330" width="100" height="55" fill="#12122a" rx="4" stroke="#8b5cf6" stroke-width="1"/>
  <text x="405" y="347" fill="#a78bfa" font-size="9" font-weight="600" text-anchor="middle">Patterns GoF</text>
  <text x="405" y="362" fill="#94a3b8" font-size="8.5" text-anchor="middle">Factory</text>
  <text x="405" y="376" fill="#94a3b8" font-size="8.5" text-anchor="middle">Observer</text>

  <rect x="470" y="330" width="120" height="55" fill="#12122a" rx="4" stroke="#8b5cf6" stroke-width="1"/>
  <text x="530" y="347" fill="#a78bfa" font-size="9" font-weight="600" text-anchor="middle">Domain Events</text>
  <text x="530" y="362" fill="#94a3b8" font-size="8.5" text-anchor="middle">UserRegistered</text>
  <text x="530" y="376" fill="#94a3b8" font-size="8.5" text-anchor="middle">sem 03 (eventos)</text>

  <text x="470" y="415" fill="#4b5563" font-size="8.5" text-anchor="middle">✅ Testeable sin BD · ✅ Framework-free</text>
  <text x="470" y="428" fill="#4b5563" font-size="8.5" text-anchor="middle">✅ SOLID aplicado · ✅ Patrones GoF</text>
  <text x="470" y="441" fill="#4b5563" font-size="8.5" text-anchor="middle">✅ Event-Driven opcion. (sem 03)</text>
  <text x="470" y="454" fill="#4b5563" font-size="8.5" text-anchor="middle">Fitness fn: no imports infra</text>

  <!-- Infrastructure adapters -->
  <rect x="70" y="478" width="540" height="50" fill="#1a1200" rx="6" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="340" y="496" fill="#f59e0b" font-size="11" font-weight="600" text-anchor="middle">⚙️ Infrastructure Adapters (sem 06–08)</text>
  <text x="150" y="514" fill="#fcd34d" font-size="9" text-anchor="middle">PostgresUserRepo</text>
  <text x="280" y="514" fill="#fcd34d" font-size="9" text-anchor="middle">JWTTokenService</text>
  <text x="400" y="514" fill="#fcd34d" font-size="9" text-anchor="middle">BcryptPasswordSvc</text>
  <text x="530" y="514" fill="#fcd34d" font-size="9" text-anchor="middle">RateLimiter</text>

  <!-- Arrow: API → PostgreSQL -->
  <line x1="628" y1="514" x2="646" y2="514" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="648" y1="514" x2="648" y2="155" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="648" y1="155" x2="650" y2="155" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="656" y="350" fill="#4b5563" font-size="8.5">SQL</text>

  <!-- External: HTTP clients -->
  <rect x="55" y="505" width="0" height="0"/>
  <text x="30" y="540" fill="#4b5563" font-size="10" font-weight="600">Actores externos →</text>
  <text x="30" y="555" fill="#6b7280" font-size="9">Browser / Postman</text>
  <text x="30" y="568" fill="#6b7280" font-size="9">HTTPS :3000</text>

  <defs>
    <marker id="farr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- Footer -->
  <text x="450" y="560" fill="#374151" font-size="10" text-anchor="middle">Bootcamp de Arquitectura de Software · SENA · bc-channel-epti</text>
</svg>
