<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" width="960" height="520">
  <rect width="960" height="520" fill="#1e1e1e"/>

  <!-- Título -->
  <text x="480" y="34" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" text-anchor="middle">Flujo Serverless / FaaS</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- Paso 1: Cliente -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="30" y="60" width="140" height="100" rx="10" fill="#2a2a2a" stroke="#3b82f6" stroke-width="2"/>
  <text x="100" y="90" fill="#3b82f6" font-family="Inter, system-ui, sans-serif" font-size="28" text-anchor="middle">&#x1F4F1;</text>
  <text x="100" y="116" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Cliente</text>
  <text x="100" y="134" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">App / Browser</text>
  <text x="100" y="150" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">HTTP Request</text>

  <!-- Flecha 1 → 2 -->
  <line x1="170" y1="110" x2="218" y2="110" stroke="#3b82f6" stroke-width="2.5"/>
  <polygon points="218,104 228,110 218,116" fill="#3b82f6"/>
  <text x="199" y="103" fill="#3b82f6" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">HTTPS</text>
  <text x="199" y="128" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">POST /courses</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- Paso 2: API Gateway -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="228" y="60" width="150" height="100" rx="10" fill="#2a2a2a" stroke="#f59e0b" stroke-width="2"/>
  <text x="303" y="88" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="26" text-anchor="middle">&#x1F6AA;</text>
  <text x="303" y="112" fill="#fcd34d" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">API Gateway</text>
  <text x="303" y="130" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Auth / Rate limit</text>
  <text x="303" y="148" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Routing / CORS</text>

  <!-- Flecha 2 → 3 -->
  <line x1="378" y1="110" x2="428" y2="110" stroke="#f59e0b" stroke-width="2.5"/>
  <polygon points="428,104 438,110 428,116" fill="#f59e0b"/>
  <text x="408" y="103" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">Evento</text>
  <text x="408" y="128" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">JSON payload</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- Paso 3: Lambda -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="438" y="40" width="180" height="140" rx="10" fill="#2a2a2a" stroke="#10b981" stroke-width="2.5"/>
  <text x="528" y="68" fill="#10b981" font-family="Inter, system-ui, sans-serif" font-size="26" text-anchor="middle">&#x26A1;</text>
  <text x="528" y="94" fill="#34d399" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Lambda / FaaS</text>
  <text x="528" y="112" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">handler(event)</text>
  <text x="528" y="130" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Node.js 20.x runtime</text>
  <text x="528" y="148" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">0-15 min ejecuci&#xF3;n</text>
  <text x="528" y="166" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">128MB - 10GB RAM</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- Cold Start explicación -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="438" y="195" width="180" height="70" rx="8" fill="#1a1200" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="528" y="215" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">&#x1F976; Cold Start</text>
  <text x="528" y="232" fill="#fcd34d" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">1&#xBA; request tras inactividad:</text>
  <text x="528" y="248" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">aprovisionar + init = 200-500ms</text>
  <text x="528" y="264" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">warm invoc. = 5-50ms</text>

  <!-- Flecha Lambda → BD -->
  <line x1="528" y1="180" x2="528" y2="300" stroke="#10b981" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="522,300 528,312 534,300" fill="#10b981"/>
  <text x="548" y="255" fill="#10b981" font-family="Inter, system-ui, sans-serif" font-size="9">query</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- Servicios externos (derecha) -->
  <!-- ══════════════════════════════════════════ -->
  <!-- Base de datos -->
  <rect x="690" y="40" width="240" height="80" rx="8" fill="#2a2a2a" stroke="#818cf8" stroke-width="1.5"/>
  <text x="810" y="68" fill="#818cf8" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">&#x1F5C4;  Base de Datos</text>
  <text x="810" y="88" fill="#a5b4fc" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">DynamoDB / RDS / Firestore</text>
  <text x="810" y="104" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Backing service externo a la funci&#xF3;n</text>

  <!-- Cache -->
  <rect x="690" y="136" width="240" height="70" rx="8" fill="#2a2a2a" stroke="#f87171" stroke-width="1.5"/>
  <text x="810" y="162" fill="#f87171" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">&#x26A1; Cache</text>
  <text x="810" y="180" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">ElastiCache / Upstash Redis</text>
  <text x="810" y="196" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Estado externo (stateless fn)</text>

  <!-- Flecha Lambda → backing services -->
  <line x1="618" y1="80" x2="688" y2="80" stroke="#818cf8" stroke-width="2"/>
  <polygon points="688,74 698,80 688,86" fill="#818cf8"/>
  <line x1="618" y1="110" x2="688" y2="171" stroke="#f87171" stroke-width="2"/>
  <polygon points="684,168 694,174 689,163" fill="#f87171"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- Respuesta de vuelta -->
  <!-- ══════════════════════════════════════════ -->
  <!-- Flecha Lambda → API Gateway (retorno) -->
  <line x1="438" y1="130" x2="388" y2="130" stroke="#10b981" stroke-width="2.5" stroke-dasharray="5,3"/>
  <polygon points="388,124 378,130 388,136" fill="#10b981"/>
  <text x="413" y="122" fill="#10b981" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">response</text>
  <text x="413" y="146" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">{statusCode:200}</text>

  <!-- Flecha API Gateway → Cliente (retorno) -->
  <line x1="228" y1="130" x2="172" y2="130" stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="5,3"/>
  <polygon points="172,124 162,130 172,136" fill="#3b82f6"/>
  <text x="200" y="122" fill="#3b82f6" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">HTTP 200</text>
  <text x="200" y="146" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">JSON response</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- Sección inferior: Comparativa modelos -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="30" y="298" width="900" height="188" rx="10" fill="#2a2a2a" stroke="#475569" stroke-width="1.5"/>
  <text x="480" y="322" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Pricing Serverless vs Servidor Tradicional</text>

  <!-- Servidor tradicional -->
  <rect x="50" y="334" width="380" height="130" rx="8" fill="#1a1a1a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="240" y="356" fill="#f87171" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Servidor EC2 t3.micro (siempre encendido)</text>
  <text x="240" y="376" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Costo: ~$8.47/mes — pagas 24h/7d/30d</text>
  <text x="240" y="394" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">100 requests/d&#xED;a o 10M requests/d&#xED;a = mismo costo</text>
  <text x="240" y="412" fill="#f87171" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" text-anchor="middle">$0.012/hora</text>
  <text x="240" y="432" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Independiente del uso real</text>
  <text x="240" y="452" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">&#x26A0; Capacidad m&#xE1;xima fija &#x2014; picos requieren pre-aprovisionamiento</text>

  <!-- Serverless -->
  <rect x="490" y="334" width="410" height="130" rx="8" fill="#1a1a1a" stroke="#10b981" stroke-width="1.5"/>
  <text x="695" y="356" fill="#34d399" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">AWS Lambda (pago por uso)</text>
  <text x="695" y="376" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">1M requests + 400K GB-seg = GRATIS cada mes</text>
  <text x="695" y="394" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Despu&#xE9;s: $0.20/1M requests + $0.00001667/GB-seg</text>
  <text x="695" y="412" fill="#10b981" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" text-anchor="middle">$0.00 en idle</text>
  <text x="695" y="432" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Paga exactamente lo que consumes</text>
  <text x="695" y="452" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">&#x2705; Escala instant&#xE1;neamente a millones de requests simult&#xE1;neos</text>
</svg>
