<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <rect width="960" height="540" fill="#1e1e1e"/>

  <!-- Título -->
  <text x="480" y="36" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" text-anchor="middle">Modelos de Servicio Cloud: IaaS / PaaS / SaaS</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- Columna IaaS -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="40" y="60" width="260" height="440" rx="10" fill="#2a2a2a" stroke="#3b82f6" stroke-width="2"/>
  <text x="170" y="92" fill="#3b82f6" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">IaaS</text>
  <text x="170" y="112" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Infrastructure as a Service</text>

  <!-- Capas apiladas IaaS -->
  <!-- Capa: App (tú) -->
  <rect x="60" y="128" width="220" height="38" rx="6" fill="#1d4ed8" opacity="0.8"/>
  <text x="170" y="151" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Aplicaci&#xF3;n</text>

  <!-- Capa: Runtime (tú) -->
  <rect x="60" y="172" width="220" height="38" rx="6" fill="#2563eb" opacity="0.8"/>
  <text x="170" y="195" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Runtime / Lenguaje</text>

  <!-- Capa: Middleware (tú) -->
  <rect x="60" y="216" width="220" height="38" rx="6" fill="#3b82f6" opacity="0.8"/>
  <text x="170" y="239" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Middleware</text>

  <!-- Capa: OS (tú) -->
  <rect x="60" y="260" width="220" height="38" rx="6" fill="#60a5fa" opacity="0.8"/>
  <text x="170" y="283" fill="#1e1e1e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Sistema Operativo</text>

  <!-- Separador -->
  <line x1="60" y1="310" x2="280" y2="310" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="170" y="326" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" font-style="italic">proveedor gestiona desde aqu&#xED;</text>

  <!-- Capa: Virtualización (proveedor) -->
  <rect x="60" y="334" width="220" height="38" rx="6" fill="#334155" opacity="0.9"/>
  <text x="170" y="357" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Virtualizaci&#xF3;n</text>

  <!-- Capa: Servidores -->
  <rect x="60" y="378" width="220" height="38" rx="6" fill="#1e293b" opacity="0.9"/>
  <text x="170" y="401" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Servidores / Hardware</text>

  <!-- Capa: Red y almacenamiento -->
  <rect x="60" y="422" width="220" height="38" rx="6" fill="#0f172a" opacity="0.9"/>
  <text x="170" y="445" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Red / Almacenamiento</text>

  <!-- Ejemplos IaaS -->
  <text x="170" y="482" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">AWS EC2 &#xB7; Azure VMs &#xB7; GCE</text>
  <text x="170" y="498" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">DigitalOcean Droplets</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- Columna PaaS -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="350" y="60" width="260" height="440" rx="10" fill="#2a2a2a" stroke="#10b981" stroke-width="2"/>
  <text x="480" y="92" fill="#10b981" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">PaaS</text>
  <text x="480" y="112" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Platform as a Service</text>

  <!-- Capa: App (tú) -->
  <rect x="370" y="128" width="220" height="38" rx="6" fill="#065f46" opacity="0.9"/>
  <text x="480" y="151" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Aplicaci&#xF3;n</text>

  <!-- Separador PaaS -->
  <line x1="370" y1="178" x2="590" y2="178" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="480" y="194" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" font-style="italic">proveedor gestiona desde aqu&#xED;</text>

  <!-- Capa: Runtime (proveedor) -->
  <rect x="370" y="202" width="220" height="38" rx="6" fill="#334155" opacity="0.9"/>
  <text x="480" y="225" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Runtime / Lenguaje</text>

  <!-- Capa: Middleware (proveedor) -->
  <rect x="370" y="246" width="220" height="38" rx="6" fill="#334155" opacity="0.9"/>
  <text x="480" y="269" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Middleware</text>

  <!-- Capa: OS (proveedor) -->
  <rect x="370" y="290" width="220" height="38" rx="6" fill="#334155" opacity="0.9"/>
  <text x="480" y="313" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Sistema Operativo</text>

  <!-- Capa: Virtualización -->
  <rect x="370" y="334" width="220" height="38" rx="6" fill="#1e293b" opacity="0.9"/>
  <text x="480" y="357" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Virtualizaci&#xF3;n</text>

  <!-- Capa: Servidores -->
  <rect x="370" y="378" width="220" height="38" rx="6" fill="#1e293b" opacity="0.9"/>
  <text x="480" y="401" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Servidores / Hardware</text>

  <!-- Capa: Red -->
  <rect x="370" y="422" width="220" height="38" rx="6" fill="#0f172a" opacity="0.9"/>
  <text x="480" y="445" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Red / Almacenamiento</text>

  <!-- Ejemplos PaaS -->
  <text x="480" y="482" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Heroku &#xB7; Vercel &#xB7; Railway</text>
  <text x="480" y="498" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">AWS Elastic Beanstalk &#xB7; App Engine</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- Columna SaaS -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="660" y="60" width="260" height="440" rx="10" fill="#2a2a2a" stroke="#f59e0b" stroke-width="2"/>
  <text x="790" y="92" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">SaaS</text>
  <text x="790" y="112" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Software as a Service</text>

  <!-- Solo datos (tú) -->
  <rect x="680" y="128" width="220" height="38" rx="6" fill="#78350f" opacity="0.9"/>
  <text x="790" y="151" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Datos del Usuario</text>

  <!-- Separador SaaS -->
  <line x1="680" y1="178" x2="900" y2="178" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="790" y="194" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" font-style="italic">proveedor gestiona todo</text>

  <!-- Todas gestionadas por proveedor -->
  <rect x="680" y="202" width="220" height="38" rx="6" fill="#334155" opacity="0.9"/>
  <text x="790" y="225" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Aplicaci&#xF3;n</text>

  <rect x="680" y="246" width="220" height="38" rx="6" fill="#334155" opacity="0.9"/>
  <text x="790" y="269" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Runtime / Middleware</text>

  <rect x="680" y="290" width="220" height="38" rx="6" fill="#334155" opacity="0.9"/>
  <text x="790" y="313" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Sistema Operativo</text>

  <rect x="680" y="334" width="220" height="38" rx="6" fill="#1e293b" opacity="0.9"/>
  <text x="790" y="357" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Virtualizaci&#xF3;n</text>

  <rect x="680" y="378" width="220" height="38" rx="6" fill="#1e293b" opacity="0.9"/>
  <text x="790" y="401" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Servidores / Hardware</text>

  <rect x="680" y="422" width="220" height="38" rx="6" fill="#0f172a" opacity="0.9"/>
  <text x="790" y="445" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Red / Almacenamiento</text>

  <!-- Ejemplos SaaS -->
  <text x="790" y="482" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Gmail &#xB7; Slack &#xB7; GitHub</text>
  <text x="790" y="498" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Salesforce &#xB7; Notion &#xB7; Figma</text>

  <!-- Leyenda -->
  <rect x="340" y="518" width="16" height="10" rx="2" fill="#1d4ed8"/>
  <text x="360" y="527" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">T&#xFA; gestionas</text>
  <rect x="440" y="518" width="16" height="10" rx="2" fill="#334155"/>
  <text x="460" y="527" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">Proveedor gestiona</text>
</svg>
