<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <rect width="960" height="540" fill="#1e1e1e"/>

  <!-- Título -->
  <text x="480" y="34" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="19" font-weight="700" text-anchor="middle">12-Factor App — Metodolog&#xED;a para aplicaciones cloud native</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- FILA 1 (factores I-IV) -->
  <!-- ══════════════════════════════════════════ -->
  <!-- Factor I: Codebase -->
  <rect x="20" y="54" width="215" height="100" rx="8" fill="#2a2a2a" stroke="#3b82f6" stroke-width="2"/>
  <text x="127" y="78" fill="#3b82f6" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">I. Codebase</text>
  <text x="127" y="96" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Un repo, m&#xFA;ltiples deploys</text>
  <text x="127" y="113" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">dev / staging / prod</text>
  <text x="127" y="130" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">comparten el mismo c&#xF3;digo</text>
  <text x="127" y="146" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">&#x1F4E6; git &#x2192; rama main</text>

  <!-- Factor II: Dependencies -->
  <rect x="248" y="54" width="215" height="100" rx="8" fill="#2a2a2a" stroke="#8b5cf6" stroke-width="2"/>
  <text x="355" y="78" fill="#8b5cf6" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">II. Dependencies</text>
  <text x="355" y="96" fill="#c4b5fd" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Dependencias expl&#xED;citas</text>
  <text x="355" y="113" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">package.json + lock file</text>
  <text x="355" y="130" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">No asumir librer&#xED;as globales</text>
  <text x="355" y="146" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">&#x1F4CB; pnpm install --frozen-lockfile</text>

  <!-- Factor III: Config -->
  <rect x="476" y="54" width="215" height="100" rx="8" fill="#2a2a2a" stroke="#10b981" stroke-width="2"/>
  <text x="583" y="78" fill="#10b981" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">III. Config</text>
  <text x="583" y="96" fill="#6ee7b7" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Config en el entorno</text>
  <text x="583" y="113" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Variables de entorno</text>
  <text x="583" y="130" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">No hardcodear configuraci&#xF3;n</text>
  <text x="583" y="146" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">&#x1F511; process.env.DATABASE_URL</text>

  <!-- Factor IV: Backing Services -->
  <rect x="704" y="54" width="236" height="100" rx="8" fill="#2a2a2a" stroke="#f59e0b" stroke-width="2"/>
  <text x="822" y="78" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">IV. Backing Services</text>
  <text x="822" y="96" fill="#fcd34d" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Servicios como recursos</text>
  <text x="822" y="113" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">BD, cache, queue = URLs</text>
  <text x="822" y="130" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Intercambiables sin cambio</text>
  <text x="822" y="146" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">&#x1F517; pg://local == pg://rds</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- FILA 2 (factores V-VIII) -->
  <!-- ══════════════════════════════════════════ -->
  <!-- Factor V: Build, Release, Run -->
  <rect x="20" y="170" width="215" height="100" rx="8" fill="#2a2a2a" stroke="#ec4899" stroke-width="2"/>
  <text x="127" y="192" fill="#ec4899" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">V. Build, Release, Run</text>
  <text x="127" y="210" fill="#f9a8d4" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">3 fases separadas</text>
  <text x="127" y="227" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Build → artefacto inmutable</text>
  <text x="127" y="244" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Release = build + config</text>
  <text x="127" y="261" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">&#x1F3D7; docker build → tag → run</text>

  <!-- Factor VI: Processes -->
  <rect x="248" y="170" width="215" height="100" rx="8" fill="#2a2a2a" stroke="#06b6d4" stroke-width="2"/>
  <text x="355" y="192" fill="#06b6d4" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">VI. Processes</text>
  <text x="355" y="210" fill="#67e8f9" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Procesos sin estado</text>
  <text x="355" y="227" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">No guardar estado en RAM</text>
  <text x="355" y="244" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Estado en BD o cache</text>
  <text x="355" y="261" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">&#x267E;  Sesiones en Redis, no Map</text>

  <!-- Factor VII: Port Binding -->
  <rect x="476" y="170" width="215" height="100" rx="8" fill="#2a2a2a" stroke="#84cc16" stroke-width="2"/>
  <text x="583" y="192" fill="#84cc16" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">VII. Port Binding</text>
  <text x="583" y="210" fill="#bef264" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Exportar por puerto</text>
  <text x="583" y="227" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">App auto-contenida</text>
  <text x="583" y="244" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">No depender de Apache/nginx</text>
  <text x="583" y="261" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">&#x1F50C; app.listen(PORT)</text>

  <!-- Factor VIII: Concurrency -->
  <rect x="704" y="170" width="236" height="100" rx="8" fill="#2a2a2a" stroke="#f97316" stroke-width="2"/>
  <text x="822" y="192" fill="#f97316" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">VIII. Concurrency</text>
  <text x="822" y="210" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Escalar por procesos</text>
  <text x="822" y="227" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">M&#xE1;s instancias, no m&#xE1;s RAM</text>
  <text x="822" y="244" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Scale out horizontal</text>
  <text x="822" y="261" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">&#x1F4CA; --scale api=3</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- FILA 3 (factores IX-XII) -->
  <!-- ══════════════════════════════════════════ -->
  <!-- Factor IX: Disposability -->
  <rect x="20" y="286" width="215" height="100" rx="8" fill="#2a2a2a" stroke="#ef4444" stroke-width="2"/>
  <text x="127" y="308" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">IX. Disposability</text>
  <text x="127" y="326" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Inicio r&#xE1;pido, cierre elegante</text>
  <text x="127" y="343" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Responder SIGTERM</text>
  <text x="127" y="360" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Procesar requests en curso</text>
  <text x="127" y="377" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">&#x1F6D1; process.on(&apos;SIGTERM&apos;, close)</text>

  <!-- Factor X: Dev/Prod Parity -->
  <rect x="248" y="286" width="215" height="100" rx="8" fill="#2a2a2a" stroke="#14b8a6" stroke-width="2"/>
  <text x="355" y="308" fill="#14b8a6" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">X. Dev/Prod Parity</text>
  <text x="355" y="326" fill="#5eead4" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Dev &#x2248; Staging &#x2248; Prod</text>
  <text x="355" y="343" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Misma BD en todos entornos</text>
  <text x="355" y="360" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Docker = misma imagen</text>
  <text x="355" y="377" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">&#x2705; No SQLite en dev + PG en prod</text>

  <!-- Factor XI: Logs -->
  <rect x="476" y="286" width="215" height="100" rx="8" fill="#2a2a2a" stroke="#a78bfa" stroke-width="2"/>
  <text x="583" y="308" fill="#a78bfa" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">XI. Logs</text>
  <text x="583" y="326" fill="#c4b5fd" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Logs como streams</text>
  <text x="583" y="343" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Escribir a stdout</text>
  <text x="583" y="360" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">El entorno decide c&#xF3;mo</text>
  <text x="583" y="377" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">&#x1F4BE; console.log(JSON.stringify(...))</text>

  <!-- Factor XII: Admin Processes -->
  <rect x="704" y="286" width="236" height="100" rx="8" fill="#2a2a2a" stroke="#fb923c" stroke-width="2"/>
  <text x="822" y="308" fill="#fb923c" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">XII. Admin Processes</text>
  <text x="822" y="326" fill="#fdba74" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Tareas admin como procesos</text>
  <text x="822" y="343" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Migraciones separadas</text>
  <text x="822" y="360" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Scripts one-time aislados</text>
  <text x="822" y="377" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">&#x1F527; node scripts/migrate.js</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- Barra inferior: resumen -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="20" y="402" width="920" height="110" rx="10" fill="#2a2a2a" stroke="#334155" stroke-width="1.5"/>
  <text x="480" y="424" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">El objetivo de los 12 factores</text>

  <text x="480" y="448" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Una aplicaci&#xF3;n 12-factor es:</text>

  <circle cx="90" cy="468" r="4" fill="#3b82f6"/>
  <text x="102" y="472" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="11">Portable entre entornos</text>

  <circle cx="280" cy="468" r="4" fill="#10b981"/>
  <text x="292" y="472" fill="#6ee7b7" font-family="Inter, system-ui, sans-serif" font-size="11">Desplegable sin fricción</text>

  <circle cx="480" cy="468" r="4" fill="#f59e0b"/>
  <text x="492" y="472" fill="#fcd34d" font-family="Inter, system-ui, sans-serif" font-size="11">Escalable horizontalmente</text>

  <circle cx="680" cy="468" r="4" fill="#a78bfa"/>
  <text x="692" y="472" fill="#c4b5fd" font-family="Inter, system-ui, sans-serif" font-size="11">Maximiza agilidad del equipo</text>

  <text x="480" y="500" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Creado por Adam Wiggins (Heroku) — https://12factor.net — Compatible con Docker, Kubernetes, Serverless y Cloud Native</text>
</svg>
