<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" font-family="Inter, Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="560" fill="#1e1e1e" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" fill="#ffffff" font-size="18" font-weight="700" text-anchor="middle">C4 Model — Los 4 Niveles de Abstracción</text>
  <text x="450" y="56" fill="#9ca3af" font-size="12" text-anchor="middle">Cada nivel responde una pregunta diferente sobre el sistema</text>

  <!-- LEVEL 1 — Context -->
  <rect x="40" y="75" width="190" height="200" fill="#0f172a" rx="8" stroke="#6366f1" stroke-width="2"/>
  <rect x="40" y="75" width="190" height="32" fill="#6366f1" rx="8"/>
  <rect x="40" y="95" width="190" height="12" fill="#6366f1"/>
  <text x="135" y="96" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">L1 — CONTEXTO</text>
  <text x="135" y="122" fill="#94a3b8" font-size="10" text-anchor="middle">¿Para quién es el sistema</text>
  <text x="135" y="136" fill="#94a3b8" font-size="10" text-anchor="middle">y con qué habla?</text>

  <!-- L1 diagram mini -->
  <circle cx="135" cy="172" r="18" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="135" y="176" fill="#6366f1" font-size="9" text-anchor="middle">Sistema</text>

  <circle cx="80" cy="172" r="10" fill="#374151"/>
  <text x="80" y="195" fill="#94a3b8" font-size="8" text-anchor="middle">Usuario</text>

  <circle cx="190" cy="172" r="10" fill="#374151"/>
  <text x="190" y="195" fill="#94a3b8" font-size="8" text-anchor="middle">Externo</text>

  <line x1="92" y1="172" x2="115" y2="172" stroke="#4b5563" stroke-width="1.5"/>
  <line x1="155" y1="172" x2="178" y2="172" stroke="#4b5563" stroke-width="1.5"/>

  <text x="135" y="225" fill="#6b7280" font-size="9" text-anchor="middle">Audiencia: Stakeholders</text>
  <text x="135" y="238" fill="#6b7280" font-size="9" text-anchor="middle">no técnicos</text>
  <text x="135" y="255" fill="#4b5563" font-size="9" text-anchor="middle">1 diagrama</text>

  <!-- LEVEL 2 — Containers -->
  <rect x="250" y="75" width="190" height="200" fill="#0f172a" rx="8" stroke="#0ea5e9" stroke-width="2"/>
  <rect x="250" y="75" width="190" height="32" fill="#0ea5e9" rx="8"/>
  <rect x="250" y="95" width="190" height="12" fill="#0ea5e9"/>
  <text x="345" y="96" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">L2 — CONTENEDORES</text>
  <text x="345" y="122" fill="#94a3b8" font-size="10" text-anchor="middle">¿En qué unidades desplegables</text>
  <text x="345" y="136" fill="#94a3b8" font-size="10" text-anchor="middle">está dividido?</text>

  <!-- L2 diagram mini -->
  <rect x="280" y="150" width="50" height="26" fill="#1e293b" rx="3" stroke="#0ea5e9" stroke-width="1.2"/>
  <text x="305" y="167" fill="#0ea5e9" font-size="8" text-anchor="middle">API</text>
  <rect x="355" y="150" width="50" height="26" fill="#1e293b" rx="3" stroke="#0ea5e9" stroke-width="1.2"/>
  <text x="380" y="167" fill="#0ea5e9" font-size="8" text-anchor="middle">BD</text>
  <rect x="280" y="190" width="50" height="26" fill="#1e293b" rx="3" stroke="#4b5563" stroke-width="1"/>
  <text x="305" y="207" fill="#6b7280" font-size="8" text-anchor="middle">Web App</text>

  <line x1="330" y1="163" x2="353" y2="163" stroke="#4b5563" stroke-width="1.2"/>
  <line x1="305" y1="178" x2="305" y2="188" stroke="#4b5563" stroke-width="1"/>

  <text x="345" y="235" fill="#6b7280" font-size="9" text-anchor="middle">Audiencia: Arquitecto</text>
  <text x="345" y="248" fill="#6b7280" font-size="9" text-anchor="middle">y DevOps</text>
  <text x="345" y="263" fill="#4b5563" font-size="9" text-anchor="middle">1–3 diagramas</text>

  <!-- LEVEL 3 — Components -->
  <rect x="460" y="75" width="190" height="200" fill="#0f172a" rx="8" stroke="#10b981" stroke-width="2"/>
  <rect x="460" y="75" width="190" height="32" fill="#10b981" rx="8"/>
  <rect x="460" y="95" width="190" height="12" fill="#10b981"/>
  <text x="555" y="96" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">L3 — COMPONENTES</text>
  <text x="555" y="122" fill="#94a3b8" font-size="10" text-anchor="middle">¿Cómo está organizado</text>
  <text x="555" y="136" fill="#94a3b8" font-size="10" text-anchor="middle">internamente un contenedor?</text>

  <!-- L3 diagram mini -->
  <rect x="477" y="152" width="60" height="18" fill="#1e293b" rx="3" stroke="#10b981" stroke-width="1"/>
  <text x="507" y="164" fill="#10b981" font-size="7.5" text-anchor="middle">Controller</text>
  <rect x="477" y="177" width="60" height="18" fill="#1e293b" rx="3" stroke="#10b981" stroke-width="1"/>
  <text x="507" y="189" fill="#10b981" font-size="7.5" text-anchor="middle">UseCase</text>
  <rect x="477" y="202" width="60" height="18" fill="#1e293b" rx="3" stroke="#10b981" stroke-width="1"/>
  <text x="507" y="214" fill="#10b981" font-size="7.5" text-anchor="middle">Repository</text>
  <line x1="507" y1="170" x2="507" y2="175" stroke="#4b5563" stroke-width="1"/>
  <line x1="507" y1="195" x2="507" y2="200" stroke="#4b5563" stroke-width="1"/>

  <rect x="550" y="165" width="60" height="18" fill="#1e293b" rx="3" stroke="#4b5563" stroke-width="1"/>
  <text x="580" y="177" fill="#6b7280" font-size="7.5" text-anchor="middle">Auth Mw</text>
  <line x1="537" y1="161" x2="550" y2="170" stroke="#4b5563" stroke-width="1"/>

  <text x="555" y="235" fill="#6b7280" font-size="9" text-anchor="middle">Audiencia: Developers</text>
  <text x="555" y="248" fill="#6b7280" font-size="9" text-anchor="middle">del servicio</text>
  <text x="555" y="263" fill="#4b5563" font-size="9" text-anchor="middle">1 por contenedor relevante</text>

  <!-- LEVEL 4 — Code -->
  <rect x="670" y="75" width="190" height="200" fill="#0f172a" rx="8" stroke="#f59e0b" stroke-width="2"/>
  <rect x="670" y="75" width="190" height="32" fill="#f59e0b" rx="8"/>
  <rect x="670" y="95" width="190" height="12" fill="#f59e0b"/>
  <text x="765" y="96" fill="#1e1e1e" font-size="12" font-weight="700" text-anchor="middle">L4 — CÓDIGO</text>
  <text x="765" y="122" fill="#94a3b8" font-size="10" text-anchor="middle">¿Cómo está implementado</text>
  <text x="765" y="136" fill="#94a3b8" font-size="10" text-anchor="middle">un componente?</text>

  <!-- L4 diagram mini (UML class) -->
  <rect x="695" y="150" width="80" height="52" fill="#1e293b" rx="3" stroke="#f59e0b" stroke-width="1"/>
  <rect x="695" y="150" width="80" height="16" fill="#334155" rx="3"/>
  <text x="735" y="162" fill="#f59e0b" font-size="7.5" text-anchor="middle">«class» User</text>
  <line x1="695" y1="166" x2="775" y2="166" stroke="#4b5563" stroke-width="0.8"/>
  <text x="700" y="177" fill="#94a3b8" font-size="7" text-anchor="start">- id: string</text>
  <text x="700" y="188" fill="#94a3b8" font-size="7" text-anchor="start">- email: string</text>
  <line x1="695" y1="193" x2="775" y2="193" stroke="#4b5563" stroke-width="0.8"/>
  <text x="700" y="198" fill="#6b7280" font-size="6.5" text-anchor="start">+ register()</text>

  <text x="765" y="225" fill="#6b7280" font-size="9" text-anchor="middle">Audiencia: El developer</text>
  <text x="765" y="238" fill="#6b7280" font-size="9" text-anchor="middle">implementando</text>
  <text x="765" y="255" fill="#f59e0b" font-size="9" text-anchor="middle">⚠️ Raramente necesario</text>

  <!-- Arrows between levels -->
  <defs>
    <marker id="carr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#374151"/>
    </marker>
  </defs>
  <line x1="232" y1="175" x2="248" y2="175" stroke="#374151" stroke-width="2" marker-end="url(#carr)"/>
  <text x="240" y="170" fill="#4b5563" font-size="9" text-anchor="middle">zoom</text>
  <line x1="442" y1="175" x2="458" y2="175" stroke="#374151" stroke-width="2" marker-end="url(#carr)"/>
  <text x="450" y="170" fill="#4b5563" font-size="9" text-anchor="middle">zoom</text>
  <line x1="652" y1="175" x2="668" y2="175" stroke="#374151" stroke-width="2" marker-end="url(#carr)"/>
  <text x="660" y="170" fill="#4b5563" font-size="9" text-anchor="middle">zoom</text>

  <!-- Required for bootcamp note -->
  <rect x="40" y="295" width="820" height="48" fill="#0f172a" rx="6" stroke="#6366f1" stroke-width="1.5"/>
  <text x="450" y="315" fill="#6366f1" font-size="12" font-weight="700" text-anchor="middle">Para el Bootcamp — Requerido en semana 09</text>
  <text x="450" y="332" fill="#94a3b8" font-size="11" text-anchor="middle">✅ L1 Contexto  ✅ L2 Contenedores  ⭕ L3 Componentes (opcional)  ❌ L4 No requerido</text>

  <!-- EduFlow example row -->
  <text x="450" y="370" fill="#6b7280" font-size="12" font-weight="600" text-anchor="middle">Ejemplo: EduFlow en C4</text>

  <!-- L1 EduFlow -->
  <rect x="40" y="385" width="190" height="130" fill="#0f172a" rx="6" stroke="#6366f1" stroke-width="1.5"/>
  <text x="135" y="403" fill="#6366f1" font-size="10" font-weight="600" text-anchor="middle">L1 — EduFlow Context</text>
  <circle cx="135" cy="433" r="22" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="135" y="437" fill="#6366f1" font-size="8.5" text-anchor="middle">EduFlow</text>
  <text x="135" y="447" fill="#6366f1" font-size="8.5" text-anchor="middle">API</text>
  <text x="73" y="430" fill="#9ca3af" font-size="8" text-anchor="middle">Estudiante</text>
  <text x="197" y="430" fill="#9ca3af" font-size="8" text-anchor="middle">Instructor</text>
  <text x="73" y="470" fill="#9ca3af" font-size="8" text-anchor="middle">Admin</text>
  <text x="197" y="470" fill="#9ca3af" font-size="8" text-anchor="middle">Email Svc</text>
  <line x1="85" y1="427" x2="112" y2="427" stroke="#374151" stroke-width="1"/>
  <line x1="158" y1="427" x2="183" y2="427" stroke="#374151" stroke-width="1"/>
  <text x="135" y="498" fill="#4b5563" font-size="8.5" text-anchor="middle">Stakeholders lo entienden</text>

  <!-- L2 EduFlow -->
  <rect x="250" y="385" width="190" height="130" fill="#0f172a" rx="6" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="345" y="403" fill="#0ea5e9" font-size="10" font-weight="600" text-anchor="middle">L2 — EduFlow Containers</text>
  <rect x="270" y="415" width="65" height="30" fill="#1e293b" rx="3" stroke="#0ea5e9" stroke-width="1.2"/>
  <text x="302" y="428" fill="#0ea5e9" font-size="8" text-anchor="middle">EduFlow API</text>
  <text x="302" y="438" fill="#4b5563" font-size="7" text-anchor="middle">Node.js</text>
  <rect x="355" y="415" width="65" height="30" fill="#1e293b" rx="3" stroke="#0ea5e9" stroke-width="1.2"/>
  <text x="387" y="428" fill="#0ea5e9" font-size="8" text-anchor="middle">PostgreSQL</text>
  <text x="387" y="438" fill="#4b5563" font-size="7" text-anchor="middle">Database</text>
  <rect x="270" y="460" width="65" height="26" fill="#1e293b" rx="3" stroke="#4b5563" stroke-width="1"/>
  <text x="302" y="476" fill="#6b7280" font-size="8" text-anchor="middle">pgAdmin</text>
  <line x1="335" y1="430" x2="353" y2="430" stroke="#4b5563" stroke-width="1" marker-end="url(#carr)"/>
  <text x="344" y="427" fill="#4b5563" font-size="7" text-anchor="middle">SQL</text>
  <line x1="387" y1="446" x2="387" y2="458" stroke="#4b5563" stroke-width="1"/>
  <line x1="337" y1="472" x2="355" y2="472" stroke="#4b5563" stroke-width="1"/>
  <text x="345" y="498" fill="#4b5563" font-size="8.5" text-anchor="middle">Arquitecto y DevOps</text>

  <!-- Mermaid code example -->
  <rect x="460" y="385" width="400" height="130" fill="#0a0a0a" rx="6" stroke="#374151" stroke-width="1.5"/>
  <text x="480" y="403" fill="#f59e0b" font-size="10" font-weight="600">Mermaid — C4 L1 básico</text>
  <text x="480" y="420" fill="#7dd3fc" font-size="9" font-family="monospace">graph TB</text>
  <text x="480" y="434" fill="#86efac" font-size="9" font-family="monospace">  user["👤 Estudiante"]</text>
  <text x="480" y="448" fill="#86efac" font-size="9" font-family="monospace">  subgraph sys["EduFlow System"]</text>
  <text x="480" y="462" fill="#86efac" font-size="9" font-family="monospace">    api["🔷 EduFlow API\nNode.js"]</text>
  <text x="480" y="476" fill="#86efac" font-size="9" font-family="monospace">  end</text>
  <text x="480" y="490" fill="#fcd34d" font-size="9" font-family="monospace">  user --"HTTPS"--> api</text>

  <!-- Footer -->
  <text x="450" y="543" fill="#374151" font-size="10" text-anchor="middle">Bootcamp de Arquitectura de Software · SENA · bc-channel-epti</text>
</svg>
