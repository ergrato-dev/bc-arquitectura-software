<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" font-family="Inter, Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="560" fill="#1e1e1e" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" fill="#ffffff" font-size="18" font-weight="700" text-anchor="middle">ISO 25010 — Modelo de Calidad del Software</text>
  <text x="450" y="56" fill="#9ca3af" font-size="12" text-anchor="middle">8 características de calidad que definen un sistema de software excelente</text>

  <!-- ── 8 Quality Characteristics ── -->
  <!-- 1: Functional Suitability -->
  <rect x="40" y="80" width="180" height="130" fill="#0f172a" rx="8" stroke="#6366f1" stroke-width="2"/>
  <rect x="40" y="80" width="180" height="30" fill="#6366f1" rx="8"/>
  <rect x="40" y="98" width="180" height="12" fill="#6366f1"/>
  <text x="130" y="100" fill="#ffffff" font-size="11" font-weight="700" text-anchor="middle">Adecuación Funcional</text>
  <text x="130" y="126" fill="#a5b4fc" font-size="9.5" text-anchor="middle">¿Hace lo que el usuario</text>
  <text x="130" y="138" fill="#a5b4fc" font-size="9.5" text-anchor="middle">realmente necesita?</text>
  <text x="54" y="160" fill="#94a3b8" font-size="9">• Completitud funcional</text>
  <text x="54" y="174" fill="#94a3b8" font-size="9">• Corrección funcional</text>
  <text x="54" y="188" fill="#94a3b8" font-size="9">• Pertinencia funcional</text>
  <text x="130" y="203" fill="#6366f1" font-size="9" font-weight="600" text-anchor="middle">sem 04 (APIs REST)</text>

  <!-- 2: Performance Efficiency -->
  <rect x="240" y="80" width="180" height="130" fill="#0f172a" rx="8" stroke="#0ea5e9" stroke-width="2"/>
  <rect x="240" y="80" width="180" height="30" fill="#0ea5e9" rx="8"/>
  <rect x="240" y="98" width="180" height="12" fill="#0ea5e9"/>
  <text x="330" y="100" fill="#ffffff" font-size="11" font-weight="700" text-anchor="middle">Eficiencia Rendimiento</text>
  <text x="330" y="126" fill="#7dd3fc" font-size="9.5" text-anchor="middle">¿Responde rápido y usa</text>
  <text x="330" y="138" fill="#7dd3fc" font-size="9.5" text-anchor="middle">recursos eficientemente?</text>
  <text x="254" y="160" fill="#94a3b8" font-size="9">• Comportamiento temporal</text>
  <text x="254" y="174" fill="#94a3b8" font-size="9">• Utilización de recursos</text>
  <text x="254" y="188" fill="#94a3b8" font-size="9">• Capacidad</text>
  <text x="330" y="203" fill="#0ea5e9" font-size="9" font-weight="600" text-anchor="middle">sem 08 (rate limiting)</text>

  <!-- 3: Compatibility -->
  <rect x="440" y="80" width="180" height="130" fill="#0f172a" rx="8" stroke="#10b981" stroke-width="2"/>
  <rect x="440" y="80" width="180" height="30" fill="#10b981" rx="8"/>
  <rect x="440" y="98" width="180" height="12" fill="#10b981"/>
  <text x="530" y="100" fill="#ffffff" font-size="11" font-weight="700" text-anchor="middle">Compatibilidad</text>
  <text x="530" y="126" fill="#6ee7b7" font-size="9.5" text-anchor="middle">¿Convive con otros sistemas</text>
  <text x="530" y="138" fill="#6ee7b7" font-size="9.5" text-anchor="middle">e intercambia datos?</text>
  <text x="454" y="160" fill="#94a3b8" font-size="9">• Coexistencia</text>
  <text x="454" y="174" fill="#94a3b8" font-size="9">• Interoperabilidad</text>
  <text x="530" y="203" fill="#10b981" font-size="9" font-weight="600" text-anchor="middle">sem 04 (contratos API)</text>

  <!-- 4: Usability -->
  <rect x="640" y="80" width="220" height="130" fill="#0f172a" rx="8" stroke="#f59e0b" stroke-width="2"/>
  <rect x="640" y="80" width="220" height="30" fill="#f59e0b" rx="8"/>
  <rect x="640" y="98" width="220" height="12" fill="#f59e0b"/>
  <text x="750" y="100" fill="#1e1e1e" font-size="11" font-weight="700" text-anchor="middle">Usabilidad</text>
  <text x="750" y="126" fill="#fde68a" font-size="9.5" text-anchor="middle">¿Los usuarios pueden usarlo</text>
  <text x="750" y="138" fill="#fde68a" font-size="9.5" text-anchor="middle">de forma efectiva?</text>
  <text x="654" y="160" fill="#94a3b8" font-size="9">• Reconocibilidad</text>
  <text x="654" y="174" fill="#94a3b8" font-size="9">• Aprendibilidad</text>
  <text x="654" y="188" fill="#94a3b8" font-size="9">• Operabilidad · Estética</text>
  <text x="750" y="203" fill="#f59e0b" font-size="9" font-weight="600" text-anchor="middle">sem 01 (análisis actores)</text>

  <!-- 5: Reliability -->
  <rect x="40" y="230" width="180" height="130" fill="#0f172a" rx="8" stroke="#22d3ee" stroke-width="2"/>
  <rect x="40" y="230" width="180" height="30" fill="#22d3ee" rx="8"/>
  <rect x="40" y="248" width="180" height="12" fill="#22d3ee"/>
  <text x="130" y="250" fill="#0f172a" font-size="11" font-weight="700" text-anchor="middle">Fiabilidad</text>
  <text x="130" y="276" fill="#67e8f9" font-size="9.5" text-anchor="middle">¿Funciona correctamente</text>
  <text x="130" y="288" fill="#67e8f9" font-size="9.5" text-anchor="middle">cuando debe?</text>
  <text x="54" y="310" fill="#94a3b8" font-size="9">• Madurez</text>
  <text x="54" y="324" fill="#94a3b8" font-size="9">• Disponibilidad</text>
  <text x="54" y="338" fill="#94a3b8" font-size="9">• Tolerancia a fallos</text>
  <text x="130" y="353" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="middle">sem 07 (Docker restart)</text>

  <!-- 6: Security -->
  <rect x="240" y="230" width="180" height="130" fill="#0f172a" rx="8" stroke="#ef4444" stroke-width="2"/>
  <rect x="240" y="230" width="180" height="30" fill="#ef4444" rx="8"/>
  <rect x="240" y="248" width="180" height="12" fill="#ef4444"/>
  <text x="330" y="250" fill="#ffffff" font-size="11" font-weight="700" text-anchor="middle">Seguridad</text>
  <text x="330" y="276" fill="#fca5a5" font-size="9.5" text-anchor="middle">¿Protege datos e</text>
  <text x="330" y="288" fill="#fca5a5" font-size="9.5" text-anchor="middle">información?</text>
  <text x="254" y="310" fill="#94a3b8" font-size="9">• Confidencialidad</text>
  <text x="254" y="324" fill="#94a3b8" font-size="9">• Integridad</text>
  <text x="254" y="338" fill="#94a3b8" font-size="9">• No repudio · Trazabilidad</text>
  <text x="330" y="353" fill="#ef4444" font-size="9" font-weight="600" text-anchor="middle">sem 08 (CIA + JWT + OWASP)</text>

  <!-- 7: Maintainability -->
  <rect x="440" y="230" width="180" height="130" fill="#0f172a" rx="8" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="440" y="230" width="180" height="30" fill="#8b5cf6" rx="8"/>
  <rect x="440" y="248" width="180" height="12" fill="#8b5cf6"/>
  <text x="530" y="250" fill="#ffffff" font-size="11" font-weight="700" text-anchor="middle">Mantenibilidad</text>
  <text x="530" y="276" fill="#c4b5fd" font-size="9.5" text-anchor="middle">¿Es fácil de modificar</text>
  <text x="530" y="288" fill="#c4b5fd" font-size="9.5" text-anchor="middle">y extender?</text>
  <text x="454" y="310" fill="#94a3b8" font-size="9">• Modularidad</text>
  <text x="454" y="324" fill="#94a3b8" font-size="9">• Reusabilidad</text>
  <text x="454" y="338" fill="#94a3b8" font-size="9">• Analizabilidad · Testeabilidad</text>
  <text x="530" y="353" fill="#8b5cf6" font-size="9" font-weight="600" text-anchor="middle">sem 02 (SOLID) · sem 06 (hex)</text>

  <!-- 8: Portability -->
  <rect x="640" y="230" width="220" height="130" fill="#0f172a" rx="8" stroke="#0284c7" stroke-width="2"/>
  <rect x="640" y="230" width="220" height="30" fill="#0284c7" rx="8"/>
  <rect x="640" y="248" width="220" height="12" fill="#0284c7"/>
  <text x="750" y="250" fill="#ffffff" font-size="11" font-weight="700" text-anchor="middle">Portabilidad</text>
  <text x="750" y="276" fill="#7dd3fc" font-size="9.5" text-anchor="middle">¿Se puede mover</text>
  <text x="750" y="288" fill="#7dd3fc" font-size="9.5" text-anchor="middle">a otro entorno?</text>
  <text x="654" y="310" fill="#94a3b8" font-size="9">• Adaptabilidad</text>
  <text x="654" y="324" fill="#94a3b8" font-size="9">• Instalabilidad</text>
  <text x="654" y="338" fill="#94a3b8" font-size="9">• Reemplazabilidad</text>
  <text x="750" y="353" fill="#0284c7" font-size="9" font-weight="600" text-anchor="middle">sem 07 (Docker) · sem 06</text>

  <!-- Trade-offs section -->
  <rect x="40" y="380" width="820" height="130" fill="#0a0a0a" rx="8" stroke="#374151" stroke-width="1.5"/>
  <text x="450" y="400" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">⚖️ Trade-offs de ISO 25010 — No puedes maximizar todos</text>

  <!-- Trade-off 1 -->
  <text x="150" y="425" fill="#ef4444" font-size="11" font-weight="600" text-anchor="middle">Seguridad vs Rendimiento</text>
  <text x="150" y="442" fill="#6b7280" font-size="9.5" text-anchor="middle">Validar JWT cada request</text>
  <text x="150" y="455" fill="#6b7280" font-size="9.5" text-anchor="middle">cuesta CPU y latencia</text>
  <line x1="55" y1="465" x2="248" y2="465" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="150" y="479" fill="#4b5563" font-size="8.5" text-anchor="middle">Decisión: priorizar seguridad</text>
  <text x="150" y="491" fill="#4b5563" font-size="8.5" text-anchor="middle">en datos sensibles</text>

  <!-- Trade-off 2 -->
  <text x="350" y="425" fill="#8b5cf6" font-size="11" font-weight="600" text-anchor="middle">Mantenibilidad vs Velocidad</text>
  <text x="350" y="442" fill="#6b7280" font-size="9.5" text-anchor="middle">Arch. Hexagonal: +30 archivos</text>
  <text x="350" y="455" fill="#6b7280" font-size="9.5" text-anchor="middle">MVC: setup en 2h, deuda alta</text>
  <line x1="260" y1="465" x2="448" y2="465" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="350" y="479" fill="#4b5563" font-size="8.5" text-anchor="middle">Decisión: invertir en calidad</text>
  <text x="350" y="491" fill="#4b5563" font-size="8.5" text-anchor="middle">para viabilidad a largo plazo</text>

  <!-- Trade-off 3 -->
  <text x="560" y="425" fill="#0ea5e9" font-size="11" font-weight="600" text-anchor="middle">Disponibilidad vs Consistencia</text>
  <text x="560" y="442" fill="#6b7280" font-size="9.5" text-anchor="middle">Siempre responder vs</text>
  <text x="560" y="455" fill="#6b7280" font-size="9.5" text-anchor="middle">datos siempre actualizados</text>
  <line x1="460" y1="465" x2="658" y2="465" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="560" y="479" fill="#4b5563" font-size="8.5" text-anchor="middle">Decisión: consistencia en</text>
  <text x="560" y="491" fill="#4b5563" font-size="8.5" text-anchor="middle">datos financieros/críticos</text>

  <!-- Trade-off 4 -->
  <text x="760" y="425" fill="#f59e0b" font-size="11" font-weight="600" text-anchor="middle">Portabilidad vs Optim.</text>
  <text x="760" y="442" fill="#6b7280" font-size="9.5" text-anchor="middle">Código genérico vs</text>
  <text x="760" y="455" fill="#6b7280" font-size="9.5" text-anchor="middle">optimización específica</text>
  <line x1="665" y1="465" x2="853" y2="465" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="760" y="479" fill="#4b5563" font-size="8.5" text-anchor="middle">Decisión: portabilidad</text>
  <text x="760" y="491" fill="#4b5563" font-size="8.5" text-anchor="middle">en arquitectura inicial</text>

  <!-- Footer -->
  <text x="450" y="540" fill="#374151" font-size="10" text-anchor="middle">Bootcamp de Arquitectura de Software · SENA · bc-channel-epti</text>
</svg>
