<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 610" width="900" height="610">
  <defs>
    <style>
      text { font-family: Inter, system-ui, sans-serif; }
      .title  { font-size: 18px; font-weight: 700; fill: #e2e8f0; }
      .sub    { font-size: 12px; fill: #94a3b8; }
      .label  { font-size: 12px; font-weight: 600; fill: #e2e8f0; }
      .small  { font-size: 10px; fill: #94a3b8; }
      .perm   { font-size: 10px; fill: #86efac; }
      .deny   { font-size: 10px; fill: #f87171; }
      .role-title { font-size: 13px; font-weight: 700; }
      .usr-label  { font-size: 11px; fill: #e2e8f0; }
    </style>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="aBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#60a5fa"/>
    </marker>
    <marker id="aPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
    </marker>
    <marker id="aGold" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fbbf24"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="610" fill="#1e1e1e" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" class="title">RBAC — Role-Based Access Control</text>
  <text x="450" y="54" text-anchor="middle" class="sub">Users → Roles → Permissions → Resources · Patrón de autorización por capas</text>
  <line x1="24" y1="64" x2="876" y2="64" stroke="#334155" stroke-width="1"/>

  <!-- ============ LAYER HEADERS ============ -->
  <text x="72"  y="88" text-anchor="middle" class="label" fill="#60a5fa">USUARIOS</text>
  <text x="250" y="88" text-anchor="middle" class="label" fill="#a78bfa">ROLES</text>
  <text x="490" y="88" text-anchor="middle" class="label" fill="#fbbf24">PERMISOS</text>
  <text x="760" y="88" text-anchor="middle" class="label" fill="#4ade80">RECURSOS</text>

  <!-- Vertical dividers -->
  <line x1="156" y1="72" x2="156" y2="500" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="356" y1="72" x2="356" y2="500" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="610" y1="72" x2="610" y2="500" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ============ USUARIOS ============ -->
  <!-- User 1 -->
  <rect x="20" y="104" width="104" height="40" fill="#0f172a" rx="8" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="72" y="121" text-anchor="middle" class="usr-label">👤 Ana García</text>
  <text x="72" y="136" text-anchor="middle" class="small">user_id: u1</text>

  <!-- User 2 -->
  <rect x="20" y="164" width="104" height="40" fill="#0f172a" rx="8" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="72" y="181" text-anchor="middle" class="usr-label">👤 Carlos M.</text>
  <text x="72" y="196" text-anchor="middle" class="small">user_id: u2</text>

  <!-- User 3 -->
  <rect x="20" y="244" width="104" height="40" fill="#0f172a" rx="8" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="72" y="261" text-anchor="middle" class="usr-label">👤 Sofía L.</text>
  <text x="72" y="276" text-anchor="middle" class="small">user_id: u3</text>

  <!-- User 4 -->
  <rect x="20" y="344" width="104" height="40" fill="#0f172a" rx="8" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="72" y="361" text-anchor="middle" class="usr-label">👤 DevAdmin</text>
  <text x="72" y="376" text-anchor="middle" class="small">user_id: u4</text>

  <!-- ============ ROLES ============ -->
  <!-- Role: viewer -->
  <rect x="172" y="104" width="160" height="52" fill="#0f172a" rx="8" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="252" y="124" text-anchor="middle" class="role-title" fill="#60a5fa">VIEWER</text>
  <text x="252" y="140" text-anchor="middle" class="small">Solo lectura</text>
  <text x="252" y="152" text-anchor="middle" class="small">role_id: viewer</text>

  <!-- Role: editor -->
  <rect x="172" y="234" width="160" height="52" fill="#0f172a" rx="8" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="252" y="254" text-anchor="middle" class="role-title" fill="#a78bfa">EDITOR</text>
  <text x="252" y="270" text-anchor="middle" class="small">Lectura + Escritura</text>
  <text x="252" y="282" text-anchor="middle" class="small">role_id: editor</text>

  <!-- Role: admin -->
  <rect x="172" y="324" width="160" height="52" fill="#0f172a" rx="8" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="252" y="344" text-anchor="middle" class="role-title" fill="#fbbf24">ADMIN</text>
  <text x="252" y="360" text-anchor="middle" class="small">Control total</text>
  <text x="252" y="372" text-anchor="middle" class="small">role_id: admin</text>

  <!-- ============ User → Role arrows ============ -->
  <line x1="124" y1="124" x2="170" y2="124" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#aBlue)"/>
  <line x1="124" y1="184" x2="170" y2="134" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#aBlue)"/>
  <line x1="124" y1="264" x2="170" y2="254" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#aPurple)"/>
  <line x1="124" y1="364" x2="170" y2="344" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#aGold)"/>

  <!-- ============ PERMISOS ============ -->
  <!-- read:resource -->
  <rect x="374" y="96" width="216" height="32" fill="#0f172a" rx="6" stroke="#4ade80" stroke-width="1"/>
  <text x="482" y="117" text-anchor="middle" class="perm">read:resource</text>

  <!-- list:resource -->
  <rect x="374" y="138" width="216" height="32" fill="#0f172a" rx="6" stroke="#4ade80" stroke-width="1"/>
  <text x="482" y="159" text-anchor="middle" class="perm">list:resource</text>

  <!-- create:resource -->
  <rect x="374" y="188" width="216" height="32" fill="#0f172a" rx="6" stroke="#a78bfa" stroke-width="1"/>
  <text x="482" y="209" text-anchor="middle" class="perm">create:resource</text>

  <!-- update:resource -->
  <rect x="374" y="230" width="216" height="32" fill="#0f172a" rx="6" stroke="#a78bfa" stroke-width="1"/>
  <text x="482" y="251" text-anchor="middle" class="perm">update:resource</text>

  <!-- delete:resource -->
  <rect x="374" y="272" width="216" height="32" fill="#0f172a" rx="6" stroke="#f87171" stroke-width="1"/>
  <text x="482" y="293" text-anchor="middle" class="deny">delete:resource</text>

  <!-- manage:users -->
  <rect x="374" y="322" width="216" height="32" fill="#0f172a" rx="6" stroke="#f59e0b" stroke-width="1"/>
  <text x="482" y="343" text-anchor="middle" class="perm" fill="#fbbf24">manage:users</text>

  <!-- manage:config -->
  <rect x="374" y="364" width="216" height="32" fill="#0f172a" rx="6" stroke="#f59e0b" stroke-width="1"/>
  <text x="482" y="385" text-anchor="middle" class="perm" fill="#fbbf24">manage:config</text>

  <!-- ============ Role → Permissions arrows ============ -->
  <!-- viewer → read, list -->
  <line x1="332" y1="124" x2="372" y2="112" stroke="#60a5fa" stroke-width="1.2" marker-end="url(#aBlue)"/>
  <line x1="332" y1="130" x2="372" y2="154" stroke="#60a5fa" stroke-width="1.2" marker-end="url(#aBlue)"/>

  <!-- editor → read, list, create, update -->
  <line x1="332" y1="255" x2="372" y2="204" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#aPurple)"/>
  <line x1="332" y1="258" x2="372" y2="246" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#aPurple)"/>
  <line x1="332" y1="262" x2="372" y2="154" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#aPurple)"/>
  <line x1="332" y1="265" x2="372" y2="112" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#aPurple)"/>

  <!-- admin → all -->
  <line x1="332" y1="344" x2="372" y2="338" stroke="#fbbf24" stroke-width="1.2" marker-end="url(#aGold)"/>
  <line x1="332" y1="348" x2="372" y2="380" stroke="#fbbf24" stroke-width="1.2" marker-end="url(#aGold)"/>
  <line x1="332" y1="354" x2="372" y2="288" stroke="#fbbf24" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#aGold)"/>

  <!-- ============ RESOURCES ============ -->
  <!-- GET /api/resource -->
  <rect x="628" y="96"  width="244" height="28" fill="#0f172a" rx="6" stroke="#4ade80" stroke-width="1"/>
  <text x="698" y="115" class="small" fill="#86efac">GET /api/[recurso]/:id</text>

  <!-- GET list -->
  <rect x="628" y="136" width="244" height="28" fill="#0f172a" rx="6" stroke="#4ade80" stroke-width="1"/>
  <text x="698" y="155" class="small" fill="#86efac">GET /api/[recurso]</text>

  <!-- POST -->
  <rect x="628" y="188" width="244" height="28" fill="#0f172a" rx="6" stroke="#a78bfa" stroke-width="1"/>
  <text x="698" y="207" class="small" fill="#c4b5fd">POST /api/[recurso]</text>

  <!-- PATCH -->
  <rect x="628" y="228" width="244" height="28" fill="#0f172a" rx="6" stroke="#a78bfa" stroke-width="1"/>
  <text x="698" y="247" class="small" fill="#c4b5fd">PATCH /api/[recurso]/:id</text>

  <!-- DELETE -->
  <rect x="628" y="272" width="244" height="28" fill="#0f172a" rx="6" stroke="#f87171" stroke-width="1"/>
  <text x="698" y="291" class="small" fill="#f87171">DELETE /api/[recurso]/:id</text>

  <!-- Users management -->
  <rect x="628" y="322" width="244" height="28" fill="#0f172a" rx="6" stroke="#f59e0b" stroke-width="1"/>
  <text x="698" y="341" class="small" fill="#fbbf24">GET/POST/DELETE /api/users</text>

  <!-- Config -->
  <rect x="628" y="360" width="244" height="28" fill="#0f172a" rx="6" stroke="#f59e0b" stroke-width="1"/>
  <text x="698" y="379" class="small" fill="#fbbf24">GET/PUT /api/config</text>

  <!-- ============ Permission → Resource arrows ============ -->
  <line x1="590" y1="112" x2="626" y2="110" stroke="#4ade80" stroke-width="1.2" marker-end="url(#aBlue)"/>
  <line x1="590" y1="154" x2="626" y2="152" stroke="#4ade80" stroke-width="1.2" marker-end="url(#aBlue)"/>
  <line x1="590" y1="204" x2="626" y2="204" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#aPurple)"/>
  <line x1="590" y1="246" x2="626" y2="244" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#aPurple)"/>
  <line x1="590" y1="288" x2="626" y2="288" stroke="#f87171" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="590" y1="338" x2="626" y2="338" stroke="#fbbf24" stroke-width="1.2" marker-end="url(#aGold)"/>
  <line x1="590" y1="380" x2="626" y2="376" stroke="#fbbf24" stroke-width="1.2" marker-end="url(#aGold)"/>

  <!-- ============ Code snippet ============ -->
  <rect x="20" y="420" width="860" height="158" fill="#0f172a" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="36" y="440" class="label" fill="#94a3b8">Middleware de autorización (en tu API):</text>
  <text x="36" y="458" font-family="'Fira Code','Courier New',monospace" font-size="11" fill="#fbbf24">// authorize('[ROL_REQUERIDO]')  →  fábrica que retorna middleware</text>
  <text x="36" y="474" font-family="'Fira Code','Courier New',monospace" font-size="11" fill="#86efac">const authorize = (...roles) =&gt; (req, res, next) =&gt; {</text>
  <text x="36" y="488" font-family="'Fira Code','Courier New',monospace" font-size="11" fill="#e2e8f0">  if (!roles.includes(req.user?.role)) return res.status(403).json({ error: 'Forbidden' });</text>
  <text x="36" y="502" font-family="'Fira Code','Courier New',monospace" font-size="11" fill="#86efac">  next(); };</text>
  <text x="36" y="522" font-family="'Fira Code','Courier New',monospace" font-size="11" fill="#7dd3fc">// Uso en rutas:</text>
  <text x="36" y="538" font-family="'Fira Code','Courier New',monospace" font-size="11" fill="#c4b5fd">router.delete('/:id', authenticate, authorize('admin'), ctrl.delete);</text>
  <text x="36" y="554" font-family="'Fira Code','Courier New',monospace" font-size="11" fill="#c4b5fd">router.post('/',      authenticate, authorize('editor','admin'), ctrl.create);</text>

  <!-- Bottom bar -->
  <rect x="0" y="578" width="900" height="32" fill="#0f172a" rx="0"/>
  <rect x="0" y="566" width="900" height="44" fill="#0f172a" rx="0"/>
  <text x="450" y="590" text-anchor="middle" class="small">Bootcamp Arquitectura de Software &#183; Semana 08 &#183; bc-channel-epti</text>
</svg>
