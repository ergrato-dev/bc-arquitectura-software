<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <rect width="960" height="540" fill="#1e1e1e"/>

  <!-- Título -->
  <text x="480" y="36" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" text-anchor="middle">JWT — Anatomía y Estructura Interna</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- TOKEN COMPLETO -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="40" y="55" width="880" height="44" rx="8" fill="#1a1a2e" stroke="#475569" stroke-width="1.5"/>
  <text x="60" y="72" fill="#f59e0b" font-family="monospace, monospace" font-size="10" font-weight="700">eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9</text>
  <text x="390" y="72" fill="#64748b" font-family="monospace, monospace" font-size="12" font-weight="700">.</text>
  <text x="400" y="72" fill="#10b981" font-family="monospace, monospace" font-size="10" font-weight="700">eyJ1c2VySWQiOiIxMjMiLCJyb2xlIjoic3R1ZGVudCIsImV4cCI6MTcwMDAwMDkwMH0</text>
  <text x="840" y="72" fill="#64748b" font-family="monospace, monospace" font-size="12" font-weight="700">.</text>
  <text x="852" y="72" fill="#e879f9" font-family="monospace, monospace" font-size="10" font-weight="700">V8YEZUgT</text>
  <text x="60" y="88" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">←</text>
  <text x="480" y="92" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">token = header.payload.signature (separados por punto)</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Las 3 partes -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- HEADER -->
  <rect x="40" y="115" width="270" height="180" rx="8" fill="#2a1a00" stroke="#f59e0b" stroke-width="2"/>
  <rect x="40" y="115" width="270" height="34" rx="8" fill="#92400e"/>
  <text x="175" y="138" fill="#fde68a" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">HEADER</text>

  <text x="60" y="168" fill="#f59e0b" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Base64URL decode:</text>
  <rect x="55" y="178" width="240" height="60" rx="4" fill="#1a1000"/>
  <text x="65" y="196" fill="#fbbf24" font-family="monospace, monospace" font-size="11">{</text>
  <text x="75" y="212" fill="#fbbf24" font-family="monospace, monospace" font-size="11">"alg": "HS256",</text>
  <text x="75" y="228" fill="#fbbf24" font-family="monospace, monospace" font-size="11">"typ": "JWT"</text>
  <text x="65" y="244" fill="#fbbf24" font-family="monospace, monospace" font-size="11">}</text>

  <text x="60" y="272" fill="#d97706" font-family="Inter, system-ui, sans-serif" font-size="10">alg: algoritmo de firma</text>
  <text x="60" y="286" fill="#d97706" font-family="Inter, system-ui, sans-serif" font-size="10">HS256 (simétrico) | RS256 (asimétrico)</text>

  <!-- Flecha H → P -->
  <line x1="310" y1="205" x2="348" y2="205" stroke="#475569" stroke-width="2"/>
  <polygon points="348,200 360,205 348,210" fill="#475569"/>

  <!-- PAYLOAD -->
  <rect x="362" y="115" width="238" height="230" rx="8" fill="#012a1a" stroke="#10b981" stroke-width="2"/>
  <rect x="362" y="115" width="238" height="34" rx="8" fill="#065f46"/>
  <text x="481" y="138" fill="#a7f3d0" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">PAYLOAD (Claims)</text>

  <text x="380" y="168" fill="#10b981" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Base64URL decode:</text>
  <rect x="375" y="178" width="210" height="110" rx="4" fill="#001a0f"/>
  <text x="385" y="196" fill="#34d399" font-family="monospace, monospace" font-size="11">{</text>
  <text x="395" y="212" fill="#34d399" font-family="monospace, monospace" font-size="11">"userId": "123",</text>
  <text x="395" y="228" fill="#34d399" font-family="monospace, monospace" font-size="11">"role": "student",</text>
  <text x="395" y="244" fill="#6ee7b7" font-family="monospace, monospace" font-size="11">"iat": 1700000000,</text>
  <text x="395" y="260" fill="#6ee7b7" font-family="monospace, monospace" font-size="11">"exp": 1700000900</text>
  <text x="385" y="276" fill="#34d399" font-family="monospace, monospace" font-size="11">}</text>

  <text x="380" y="306" fill="#059669" font-family="Inter, system-ui, sans-serif" font-size="10">iat: issued at (emisión)</text>
  <text x="380" y="320" fill="#059669" font-family="Inter, system-ui, sans-serif" font-size="10">exp: expiración (15 min)</text>
  <text x="380" y="334" fill="#dc2626" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">⚠ NO cifrado — solo codificado</text>

  <!-- Flecha P → S -->
  <line x1="600" y1="205" x2="638" y2="205" stroke="#475569" stroke-width="2"/>
  <polygon points="638,200 650,205 638,210" fill="#475569"/>

  <!-- SIGNATURE -->
  <rect x="652" y="115" width="270" height="230" rx="8" fill="#2e0045" stroke="#e879f9" stroke-width="2"/>
  <rect x="652" y="115" width="270" height="34" rx="8" fill="#6b21a8"/>
  <text x="787" y="138" fill="#f0abfc" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">SIGNATURE</text>

  <text x="670" y="168" fill="#e879f9" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Algoritmo:</text>
  <rect x="665" y="178" width="242" height="100" rx="4" fill="#1a0028"/>
  <text x="675" y="196" fill="#c084fc" font-family="monospace, monospace" font-size="10">HMAC-SHA256(</text>
  <text x="685" y="212" fill="#e879f9" font-family="monospace, monospace" font-size="10">base64(header) + "."</text>
  <text x="685" y="228" fill="#e879f9" font-family="monospace, monospace" font-size="10">+ base64(payload),</text>
  <text x="685" y="244" fill="#f0abfc" font-family="monospace, monospace" font-size="10">JWT_SECRET</text>
  <text x="675" y="260" fill="#c084fc" font-family="monospace, monospace" font-size="10">)</text>

  <text x="670" y="298" fill="#a855f7" font-family="Inter, system-ui, sans-serif" font-size="10">Verifica INTEGRIDAD</text>
  <text x="670" y="312" fill="#a855f7" font-family="Inter, system-ui, sans-serif" font-size="10">Si el payload fue modificado,</text>
  <text x="670" y="326" fill="#a855f7" font-family="Inter, system-ui, sans-serif" font-size="10">la firma no coincide → rechazado</text>
  <text x="670" y="342" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">✅ Solo el servidor conoce el secret</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Flujo de verificación -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="40" y="365" width="880" height="155" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1.5"/>
  <text x="480" y="388" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Flujo de Verificación</text>

  <!-- Paso 1 -->
  <rect x="65" y="398" width="160" height="50" rx="6" fill="#1d4ed8" opacity="0.8"/>
  <text x="145" y="418" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">1. Cliente envía</text>
  <text x="145" y="434" fill="#bfdbfe" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Authorization: Bearer &lt;JWT&gt;</text>

  <polygon points="230,423 245,418 230,413" fill="#64748b"/>
  <line x1="225" y1="418" x2="245" y2="418" stroke="#64748b" stroke-width="2"/>

  <!-- Paso 2 -->
  <rect x="250" y="398" width="160" height="50" rx="6" fill="#7c3aed" opacity="0.8"/>
  <text x="330" y="418" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">2. Separar partes</text>
  <text x="330" y="434" fill="#ddd6fe" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">header . payload . sig</text>

  <polygon points="415,423 430,418 415,413" fill="#64748b"/>
  <line x1="410" y1="418" x2="430" y2="418" stroke="#64748b" stroke-width="2"/>

  <!-- Paso 3 -->
  <rect x="435" y="398" width="160" height="50" rx="6" fill="#059669" opacity="0.8"/>
  <text x="515" y="418" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">3. Re-firmar</text>
  <text x="515" y="434" fill="#a7f3d0" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">HMAC(header.payload, secret)</text>

  <polygon points="600,423 615,418 600,413" fill="#64748b"/>
  <line x1="595" y1="418" x2="615" y2="418" stroke="#64748b" stroke-width="2"/>

  <!-- Paso 4 -->
  <rect x="620" y="398" width="160" height="50" rx="6" fill="#dc2626" opacity="0.8"/>
  <text x="700" y="418" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">4. Comparar firmas</text>
  <text x="700" y="434" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">re-firmado === sig original?</text>

  <!-- Resultado -->
  <rect x="180" y="463" width="180" height="42" rx="6" fill="#14532d"/>
  <text x="270" y="480" fill="#4ade80" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">✅ SÍ → 200 OK</text>
  <text x="270" y="496" fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">req.user = payload decodificado</text>

  <rect x="600" y="463" width="180" height="42" rx="6" fill="#7f1d1d"/>
  <text x="690" y="480" fill="#f87171" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">❌ NO → 401</text>
  <text x="690" y="496" fill="#fca5a5" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Token inválido o manipulado</text>

  <!-- Flechas resultado -->
  <line x1="700" y1="450" x2="700" y2="462" stroke="#475569" stroke-width="1.5"/>
  <line x1="700" y1="450" x2="270" y2="450" stroke="#475569" stroke-width="1.5"/>
  <line x1="270" y1="450" x2="270" y2="462" stroke="#475569" stroke-width="1.5"/>

</svg>
