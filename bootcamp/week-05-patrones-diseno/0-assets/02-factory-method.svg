<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560">
  <rect width="900" height="560" fill="#1e1e1e"/>

  <!-- Título -->
  <text x="450" y="44" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="bold" text-anchor="middle" fill="#e0e0e0">Patrón Factory Method</text>
  <text x="450" y="68" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle" fill="#999">Crea objetos sin acoplarse a la clase concreta</text>

  <!-- Cliente -->
  <rect x="30" y="110" width="140" height="60" rx="8" fill="#2a2a2a" stroke="#9b59b6" stroke-width="2"/>
  <text x="100" y="135" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#9b59b6">Cliente</text>
  <text x="100" y="155" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#ccc">usa Notification</text>

  <!-- Flecha cliente → factory -->
  <line x1="170" y1="140" x2="240" y2="140" stroke="#9b59b6" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <defs>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9b59b6"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3498db"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8c8d"/>
    </marker>
  </defs>

  <!-- NotificationFactory -->
  <rect x="240" y="90" width="200" height="100" rx="8" fill="#2a2a2a" stroke="#3498db" stroke-width="2.5"/>
  <rect x="240" y="90" width="200" height="30" rx="8" fill="#2980b9"/>
  <text x="340" y="110" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">NotificationFactory</text>
  <line x1="240" y1="120" x2="440" y2="120" stroke="#3498db" stroke-width="1.5"/>
  <text x="260" y="140" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#a8d8f0">+ create(type, dest)</text>
  <text x="260" y="158" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#a8d8f0">+ register(type, Class)</text>
  <text x="260" y="176" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6c9dbc">«static»</text>

  <!-- Flecha factory → Notification (abstracción) -->
  <line x1="340" y1="190" x2="340" y2="240" stroke="#3498db" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="360" y="220" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#7f8c8d">crea</text>

  <!-- Notification (base abstracta) -->
  <rect x="220" y="240" width="240" height="70" rx="8" fill="#2a2a2a" stroke="#e74c3c" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="340" y="262" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#e74c3c" font-style="italic">«abstracta»</text>
  <text x="340" y="280" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#e0e0e0">Notification</text>
  <text x="340" y="298" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#aaa">+ send(message): result</text>

  <!-- Flechas base → concretas -->
  <line x1="260" y1="310" x2="130" y2="360" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="340" y1="310" x2="340" y2="360" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="420" y1="310" x2="560" y2="360" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="440" y1="310" x2="700" y2="360" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- EmailNotification -->
  <rect x="30" y="360" width="200" height="80" rx="8" fill="#2a2a2a" stroke="#2ecc71" stroke-width="2"/>
  <rect x="30" y="360" width="200" height="28" rx="8" fill="#27ae60"/>
  <text x="130" y="379" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">EmailNotification</text>
  <line x1="30" y1="388" x2="230" y2="388" stroke="#2ecc71" stroke-width="1"/>
  <text x="50" y="406" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#a8e6c1">- #email: string</text>
  <text x="50" y="422" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#a8e6c1">+ send(message)</text>

  <!-- SmsNotification -->
  <rect x="250" y="360" width="200" height="80" rx="8" fill="#2a2a2a" stroke="#f39c12" stroke-width="2"/>
  <rect x="250" y="360" width="200" height="28" rx="8" fill="#e67e22"/>
  <text x="350" y="379" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">SmsNotification</text>
  <line x1="250" y1="388" x2="450" y2="388" stroke="#f39c12" stroke-width="1"/>
  <text x="270" y="406" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fde3a7">- #phone: string</text>
  <text x="270" y="422" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fde3a7">+ send(message)</text>

  <!-- PushNotification -->
  <rect x="470" y="360" width="200" height="80" rx="8" fill="#2a2a2a" stroke="#e74c3c" stroke-width="2"/>
  <rect x="470" y="360" width="200" height="28" rx="8" fill="#c0392b"/>
  <text x="570" y="379" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">PushNotification</text>
  <line x1="470" y1="388" x2="670" y2="388" stroke="#e74c3c" stroke-width="1"/>
  <text x="490" y="406" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#f5b7b1">- #deviceToken: string</text>
  <text x="490" y="422" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#f5b7b1">+ send(message)</text>

  <!-- WhatsApp (extensible) -->
  <rect x="690" y="360" width="185" height="80" rx="8" fill="#2a2a2a" stroke="#555" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="782" y="379" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#777">WhatsAppNotif.</text>
  <text x="782" y="400" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#555">+ send(message)</text>
  <text x="782" y="428" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#2ecc71">← extensible sin</text>
  <text x="782" y="442" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#2ecc71">modificar Factory</text>

  <!-- Principios -->
  <rect x="30" y="480" width="840" height="58" rx="8" fill="#1a2634" stroke="#3498db" stroke-width="1.5"/>
  <text x="450" y="502" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#3498db">Principios SOLID reforzados</text>
  <text x="230" y="522" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#e0e0e0">🟢 OCP — agregar tipo nuevo = nueva clase, sin modificar la Factory</text>
  <text x="680" y="522" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#e0e0e0">🟢 DIP — el cliente depende de Notification, no de EmailNotification</text>
</svg>
